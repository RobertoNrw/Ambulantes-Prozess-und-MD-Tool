              { x: DIMENSIONEN.map(d => DIM_LABELS[d]), y: DIMENSIONEN.map(d => benchmarks[d].topQuartile), type: "bar", name: "Top-Quartil", marker: { color: "#10b981" } },
            ]}
            layout={{ height: 350, barmode: "group", yaxis: { range: [0, 100] }, legend: { orientation: "h", y: 1.12 } }}
          />
        </CardBody>
      </Card>

      {/* Positioning Table */}
      <Card>
        <CardHeader title="Positionierung" subtitle="Δ Branche = Abstand zum Durchschnitt. Gap zu Top = wie weit bis zum besten Viertel. Positive Werte = besser als Vergleich." icon={Icons.TrendingUp} />
        <CardBody>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "2px solid #e5e7eb" }}>
                {["Dimension", "Eigen", "Branche", "Δ Branche", "Top-Quartil", "Gap zu Top"].map(h => (
                  <th key={h} style={{ padding: "7px", textAlign: h === "Dimension" ? "left" : "center", fontSize: 10, color: "#6b7280" }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {DIMENSIONEN.map(d => {
                const own = dimScores[d] || 0;
                const br = benchmarks[d].branche;
                const top = benchmarks[d].topQuartile;
                const delta = own - br;
                return (
                  <tr key={d} style={{ borderBottom: "1px solid #f1f5f9" }}>
                    <td style={{ padding: 7, fontSize: 11, fontWeight: 600 }}>{DIM_LABELS[d]}</td>
                    <td style={{ padding: 7, textAlign: "center", fontFamily: "monospace", fontWeight: 700, color: ampel(own).color }}>{own}%</td>
                    <td style={{ padding: 7, textAlign: "center", fontFamily: "monospace", color: "#6b7280" }}>{br}%</td>
                    <td style={{ padding: 7, textAlign: "center", fontFamily: "monospace", fontWeight: 700, color: delta >= 0 ? "#10b981" : "#ef4444" }}>
                      {delta >= 0 ? "+" : ""}{delta}%
                    </td>
                    <td style={{ padding: 7, textAlign: "center", fontFamily: "monospace", color: "#10b981" }}>{top}%</td>
                    <td style={{ padding: 7, textAlign: "center", fontFamily: "monospace", color: "#f59e0b" }}>{top - own}%</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </CardBody>
      </Card>
    </>
  );
}

function EmpfehlungsModule({ dimScores, interviews, codings, answers }) {
  const empfehlungen = useMemo(() => {
    const result = [];
    const ds = dimScores || {};
    // Generate recommendations based on dimension scores
    if ((ds.prozess || 0) < 2.5) result.push({ prio: 1, bereich: "Prozessstabilität", icon: "🔴", text: "Tourenplanung und Ausfallmanagement systematisieren. Empfehlung: Digitale Tourenplanungssoftware einführen, Springerpool aufbauen, Eskalationsstufen definieren.", qpr: "QB1" });
    if ((ds.ressource || 0) < 2.5) result.push({ prio: 1, bereich: "Ressourcenlage", icon: "🔴", text: "Personalstrategie entwickeln: Recruiting-Offensive, Kooperation mit Pflegeschulen, Arbeitszeitmodelle flexibilisieren, Vereinbarkeit verbessern.", qpr: "QB5" });
    if ((ds["qualität"] || 0) < 2.5) result.push({ prio: 1, bereich: "Qualitätsstruktur", icon: "🔴", text: "QM-System aktivieren: SIS-Erstellung und Evaluation systematisieren, Risikomanagement implementieren, Pflegevisiten einführen.", qpr: "QB2" });
    if ((ds.digital || 0) < 2.5) result.push({ prio: 2, bereich: "Digitalisierung", icon: "🟡", text: "Digitalisierungsstrategie erstellen: Mobile Dokumentation einführen, Diensthandys bereitstellen, Schulungsplan für Software erstellen.", qpr: "QB5" });
    if ((ds.prozess || 0) >= 2.5 && (ds.prozess || 0) < 3.5) result.push({ prio: 2, bereich: "Prozessoptimierung", icon: "🟡", text: "Bezugspflege stärken, Übergabeprozesse standardisieren, Pausenzeiten systematisch sicherstellen.", qpr: "QB1" });
    if ((ds.ressource || 0) >= 2.5 && (ds.ressource || 0) < 3.5) result.push({ prio: 2, bereich: "Personalentwicklung", icon: "🟡", text: "Fortbildungsplanung verstetigen, Einarbeitungskonzept etablieren, Mitarbeitergespräche institutionalisieren.", qpr: "QB5" });

    // Code-based recommendations
    const codeFreq = {};
    codings.forEach(c => { codeFreq[c.codeId] = (codeFreq[c.codeId] || 0) + 1; });
    const topCodes = Object.entries(codeFreq).sort((a, b) => b[1] - a[1]).slice(0, 5);
    topCodes.forEach(([codeId, count]) => {
      const code = CODEBUCH.find(c => c.id === codeId);
      if (code && code.krit >= 3 && count >= 2) {
        result.push({ prio: 1, bereich: code.ober, icon: "⚠️", text: `${code.label} (${count}x genannt) – Kritikalität hoch. Sofortmaßnahme erforderlich.`, qpr: code.qpr });
      }
    });

    // MuG 2026 recommendations
    result.push({ prio: 3, bereich: "QPR-Vorbereitung 2026", icon: "📋", text: "Neue QPR ab 01.07.2026: A-B-C-D Bewertung pro Qualitätsbereich. Vorbereitung: Sechs-Quellen-Prinzip verstehen (Doku allein reicht nicht mehr), Mitarbeitergespräche als Evidenzquelle vorbereiten.", qpr: "QB1-5" });
    result.push({ prio: 3, bereich: "MuG ambulant 2026", icon: "📋", text: "Neue MuG ab 01.07.2026: Zwei-Säulen-Modell für Betreuungskräfte (formell/materiell). Personalakten prüfen: Zuordnungsraster erstellen, Kompetenzfeststellungen dokumentieren, Schulungsnachweise sichern.", qpr: "QB5" });

    if (result.length === 0) result.push({ prio: 3, bereich: "Gesamtbewertung", icon: "🟢", text: "Gute Ausgangslage. Fokus auf kontinuierliche Verbesserung und QPR-2026-Vorbereitung.", qpr: "—" });

    return result.sort((a, b) => a.prio - b.prio);
  }, [dimScores, codings]);

  return (
    <>
      <PageTitle title="Empfehlungen" subtitle="Automatisch generierte Handlungsempfehlungen, priorisiert nach Dringlichkeit. Prio 1 = sofort handeln, Prio 2 = mittelfristig, Prio 3 = Vorbereitung." />
      <Card>
        <CardBody>
          <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 12 }}>
            Priorisierte Empfehlungen auf Basis der Dimensionsbewertungen, häufigsten Codes und regulatorischer Änderungen (QPR/MuG 2026).
          </div>
          {empfehlungen.map((e, i) => (
            <div key={i} style={{
              padding: "12px 14px", borderRadius: 8, marginBottom: 8,
              border: `1px solid ${e.prio === 1 ? "#fecaca" : e.prio === 2 ? "#fde68a" : "#d1d5db"}`,
              background: e.prio === 1 ? "#fef2f2" : e.prio === 2 ? "#fffbeb" : "#f9fafb"
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                <span style={{ fontSize: 16 }}>{e.icon}</span>
                <span style={{ fontSize: 12, fontWeight: 700, color: "#111827" }}>{e.bereich}</span>
                <Badge label={`Prio ${e.prio}`} color={e.prio === 1 ? "#ef4444" : e.prio === 2 ? "#f59e0b" : "#6b7280"} bg={e.prio === 1 ? "#fef2f2" : e.prio === 2 ? "#fffbeb" : "#f3f4f6"} />
                <span style={{ fontSize: 12, color: "#9ca3af", marginLeft: "auto" }}>{e.qpr}</span>
              </div>
              <div style={{ fontSize: 11, color: "#374151", lineHeight: 1.5 }}>{e.text}</div>
            </div>
          ))}
        </CardBody>
      </Card>
    </>
  );
}

function WissenschaftModule({ answers, interviews, codings, dimScores, orgScore, evidenceCoverage }) {
  const bootstrapCI = useMemo(() => berechneBootstrapCI(answers), [answers]);
  const sensAnalysis = useMemo(() => sensitivitaetsanalyse(answers), [answers]);
  const dataQuality = useMemo(() => berechneDatenqualitaet(interviews, codings, answers), [interviews, codings, answers]);

  const answeredCount = Object.values(answers).filter(v => v > 0).length;
  const values = Object.values(answers).filter(v => v > 0);

  // QPR-2026 ABCD Verteilung
  const abcdDist = { D: 0, C: 0, B: 0, A: 0 };
  values.forEach(v => { if (v === 1) abcdDist.D++; if (v === 2) abcdDist.C++; if (v === 3) abcdDist.B++; if (v === 4) abcdDist.A++; });
  const abcdTotal = values.length || 1;

  // Code-Cluster-Analyse
  const clusterAnalysis = useMemo(() => {
    const freq = {};
    codings.forEach(c => {
      const code = CODEBUCH.find(cb => cb.id === c.codeId);
      if (code) {
        if (!freq[code.ober]) freq[code.ober] = { count: 0, codes: {}, krit3: 0 };
        freq[code.ober].count++;
        freq[code.ober].codes[c.codeId] = (freq[code.ober].codes[c.codeId] || 0) + 1;
        if (code.krit >= 3) freq[code.ober].krit3++;
      }
    });
    return Object.entries(freq).sort((a, b) => b[1].count - a[1].count);
  }, [codings]);

  const sankeyData = useMemo(() => {
    if (!codings.length) return null;
    const roleNodes = ROLLEN;
    const clusterNodes = clusterAnalysis.map(([cluster]) => cluster);
    const qprNodes = QPR_ASPEKTE.map(a => a.id);

    const labels = [
      ...roleNodes.map(r => ROLLEN_LABELS[r]?.split("(")[0]?.trim() || r),
      ...clusterNodes.map(c => (typeof CLUSTER_LABELS !== "undefined" ? (CLUSTER_LABELS[c] || c) : c)),
      ...qprNodes
    ];

    const roleOffset = 0;
    const clusterOffset = roleNodes.length;
    const qprOffset = roleNodes.length + clusterNodes.length;

    const source = [];
    const target = [];
    const value = [];

    const roleClusterCounts = {};
    const clusterQprCounts = {};

    codings.forEach(c => {
      const code = CODEBUCH.find(cb => cb.id === c.codeId);
      if (!code) return;
      const cluster = code.ober;
      const qprId = code.qpr;
      const role = c.rolle || "PDL";

      const rcKey = role + "|" + cluster;
      roleClusterCounts[rcKey] = (roleClusterCounts[rcKey] || 0) + 1;

      const cqKey = cluster + "|" + qprId;
      clusterQprCounts[cqKey] = (clusterQprCounts[cqKey] || 0) + 1;
    });

    Object.entries(roleClusterCounts).forEach(([key, count]) => {
      const [role, cluster] = key.split("|");
      const rIndex = roleNodes.indexOf(role);
      const cIndex = clusterNodes.indexOf(cluster);
      if (rIndex === -1 || cIndex === -1) return;
      source.push(roleOffset + rIndex);
      target.push(clusterOffset + cIndex);
      value.push(count);
    });

    Object.entries(clusterQprCounts).forEach(([key, count]) => {
      const [cluster, qprId] = key.split("|");
      const cIndex = clusterNodes.indexOf(cluster);
      const qIndex = qprNodes.indexOf(qprId);
      if (cIndex === -1 || qIndex === -1) return;
      source.push(clusterOffset + cIndex);
      target.push(qprOffset + qIndex);
      value.push(count);
    });

    if (!value.length) return null;
    return { labels, source, target, value };
  }, [codings, clusterAnalysis]);

  // Inter-Role Consistency
  const roleScores = useMemo(() => {
    const result = {};
    interviews.forEach(iv => {
      const qs = getQuestionsForRole(iv.role);
      let sum = 0, count = 0;
      qs.forEach(q => { const v = answers[q.id]; if (v > 0) { sum += v; count++; } });
      if (count > 0) {
        if (!result[iv.role]) result[iv.role] = [];
        result[iv.role].push(Math.round((sum / count) * 25));
      }
    });
    return result;
  }, [interviews, answers]);

  // Descriptive
  const descriptive = values.length > 0 ? {
    mean: Stats.mean(values).toFixed(2),
    median: Stats.median(values),
    sd: Stats.standardDeviation(values).toFixed(2),
    skewness: Stats.skewness(values).toFixed(3),
    n: values.length,
    iqrData: Stats.iqr(values)
  } : null;

  return (
    <>
      <PageTitle title="Wissenschaftliche Analyse" subtitle="QPR-2026-Verteilung · Bootstrap-KI · Code-Cluster · Datenqualität" />

      {/* Row 1: Data Quality + ABCD Distribution */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <Card style={{ background: dataQuality.score >= 75 ? "#ecfdf5" : dataQuality.score >= 60 ? "#fffbeb" : "#fef2f2" }}>
          <CardBody>
            <div style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1 }}>Datenqualität</div>
            <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "monospace", color: ampel(dataQuality.score).color, marginTop: 2 }}>
              {dataQuality.score}/100
            </div>
            <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>{dataQuality.interpretation}</div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 4, marginTop: 8, fontSize: 10 }}>
              {Object.entries(dataQuality.components).map(([key, value]) => (
                <div key={key} style={{ padding: "3px 8px", background: "rgba(255,255,255,0.7)", borderRadius: 4 }}>
                  <span style={{ color: "#6b7280" }}>{key}: </span>
                  <span style={{ fontWeight: 700 }}>{value}</span>
                </div>
              ))}
            </div>
          </CardBody>
        </Card>

        <Card>
          <CardBody>
            <div style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1 }}>QPR-2026 Bewertungsverteilung (A–D)</div>
            <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
              {[
                { k: "A", v: abcdDist.A, c: "#10b981", l: "keine Mängel" },
                { k: "B", v: abcdDist.B, c: "#3b82f6", l: "Auffälligkeit" },
                { k: "C", v: abcdDist.C, c: "#f59e0b", l: "Risiko" },
                { k: "D", v: abcdDist.D, c: "#ef4444", l: "kritisch" },
              ].map(item => (
                <div key={item.k} style={{ flex: 1, textAlign: "center" }}>
                  <div style={{ fontSize: 24, fontWeight: 800, color: item.c }}>{item.v}</div>
                  <div style={{ fontSize: 10, fontWeight: 700, color: item.c }}>{item.k}</div>
                  <div style={{ fontSize: 12, color: "#9ca3af" }}>{item.l}</div>
                  <div style={{ fontSize: 12, color: "#6b7280" }}>{Math.round((item.v / abcdTotal) * 100)}%</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 8, height: 12, display: "flex", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ width: `${(abcdDist.A / abcdTotal) * 100}%`, background: "#10b981" }} />
              <div style={{ width: `${(abcdDist.B / abcdTotal) * 100}%`, background: "#3b82f6" }} />
              <div style={{ width: `${(abcdDist.C / abcdTotal) * 100}%`, background: "#f59e0b" }} />
              <div style={{ width: `${(abcdDist.D / abcdTotal) * 100}%`, background: "#ef4444" }} />
            </div>
            <div style={{ fontSize: 12, color: "#6b7280", marginTop: 6, lineHeight: 1.5 }}>
              {abcdDist.D > abcdDist.A ? "Mehrheit D-Bewertungen: Akuter Handlungsbedarf vor QPR-Prüfung." :
               abcdDist.C > abcdDist.A ? "C-Bewertungen dominieren: Risiken identifiziert, Maßnahmenplan erforderlich." :
               "A/B-Bewertungen überwiegen: Solide Ausgangslage für QPR-Prüfung."}
            </div>
          </CardBody>
        </Card>
      </div>

      {/* Row 2: Bootstrap CI + Sensitivity */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <Card>
          <CardHeader title="Organisations-Gesamtscore" subtitle="Wie sicher ist der Wert? Der Fehlerbalken zeigt den Bereich, in dem der wahre Score mit 95% Sicherheit liegt." icon={Icons.Shield} />
          <CardBody>
            <div style={{ fontSize: 32, fontWeight: 700, fontFamily: "monospace", color: "#111827" }}>{orgScore}%</div>
            <div style={{ fontSize: 11, color: "#6b7280", margin: "4px 0" }}>
              95% KI: <strong>[{bootstrapCI.lower}%, {bootstrapCI.upper}%]</strong> · SE: ±{bootstrapCI.se}%
            </div>
            <div style={{ fontSize: 10, color: "#9ca3af" }}>{bootstrapCI.interpretation}</div>
            <PlotlyChart
              data={[{
                x: ["Organisations-Score"], y: [orgScore],
                error_y: { type: "data", symmetric: false, array: [bootstrapCI.upper - orgScore], arrayminus: [orgScore - bootstrapCI.lower], color: "var(--clr-primary)" },
                type: "bar", name: "Score mit 95%-KI", marker: { color: "var(--clr-primary)" }, width: [0.3],
                hovertemplate: "Score: %{y}%<br>95%-KI: [" + bootstrapCI.lower + "%, " + bootstrapCI.upper + "%]<extra></extra>"
              }]}
              layout={{ height: 160, yaxis: { range: [0, 100], title: "%" }, showlegend: false, margin: { t: 10, b: 30, l: 50, r: 10 }, annotations: [{text:"Fehlerbalken = 95% Bootstrap-Konfidenzintervall (n=1000)",xref:"paper",yref:"paper",x:0.5,y:-0.2,showarrow:false,font:{size:8,color:"#9ca3af"}}] }}
            />
          </CardBody>
        </Card>

        <Card>
          <CardHeader title="Belastbarkeit des Ergebnisses" subtitle="Was passiert, wenn man die Gewichtung der 4 Dimensionen leicht verschiebt? Kleiner Bereich = robustes Ergebnis." icon={Icons.Activity} />
          <CardBody>
            <div style={{ fontSize: 11, color: "#6b7280", marginBottom: 4 }}>Score-Range:</div>
            <div style={{ fontSize: 24, fontWeight: 700, fontFamily: "monospace" }}>
              {sensAnalysis.range.min}% – {sensAnalysis.range.max}%
            </div>
            <Badge
              label={sensAnalysis.robustness}
              color={sensAnalysis.range.span <= 10 ? "#059669" : "#f59e0b"}
              bg={sensAnalysis.range.span <= 10 ? "#ecfdf5" : "#fffbeb"}
            />
            <div style={{ marginTop: 8 }}>
              {sensAnalysis.variations.map((v, i) => (
                <div key={i} style={{
                  display: "flex", justifyContent: "space-between", padding: "3px 0",
                  borderBottom: "1px solid #f3f4f6", fontSize: 10
                }}>
                  <span style={{ color: "#6b7280" }}>{DIM_LABELS[v.dimension] || v.dimension} +10%</span>
                  <span style={{ fontWeight: 600 }}>{v.score}%</span>
                </div>
              ))}
            </div>
          </CardBody>
        </Card>
      </div>

      {/* Sankey: Rollen → Cluster → QPR */}
      {sankeyData && (
        <Card style={{ marginBottom: 16 }}>
          <CardHeader
            title="Versorgungsfluss: Rollen → Themen → QPR"
            subtitle="Sankey-Diagramm: Wo entstehen Probleme? Jede Bahn entspricht der Häufigkeit der Codierungen."
            icon={Icons.Activity}
          />
          <CardBody>
            <PlotlyChart
              data={[{
                type: "sankey",
                orientation: "h",
                node: {
                  pad: 12,
                  thickness: 14,
                  label: sankeyData.labels,
                  color: sankeyData.labels.map((lbl, idx) => idx < ROLLEN.length ? "#e5e7eb" : idx < ROLLEN.length + clusterAnalysis.length ? "#fee2e2" : "#e0f2fe"),
                },
                link: {
                  source: sankeyData.source,
                  target: sankeyData.target,
                  value: sankeyData.value,
                  color: "rgba(59,130,246,0.4)",
                },
                hovertemplate: "%{source.label} → %{target.label}: %{value} Codes<extra></extra>",
              }]}
              layout={{
                height: 320,
                margin: { l: 20, r: 20, t: 10, b: 10 },
              }}
            />
          </CardBody>
        </Card>
      )}

      {/* Row 3: Code-Cluster + Inter-Role */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 16 }}>
        <Card>
          <CardHeader title="Schwerpunktanalyse" subtitle="In welchen Themenbereichen wurden die meisten Auffälligkeiten codiert? Rote Balken = kritische Codes darunter." icon={Icons.AlertTriangle} />
          <CardBody>
            {clusterAnalysis.length === 0 ? (
              <div style={{ fontSize: 10, color: "#9ca3af", textAlign: "center", padding: 16 }}>Noch keine Codierungen vorhanden</div>
            ) : (
              clusterAnalysis.map(([cluster, data]) => {
                const maxC = clusterAnalysis[0]?.[1]?.count || 1;
                return (
                  <div key={cluster} style={{ marginBottom: 8 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, marginBottom: 2 }}>
                      <span style={{ fontWeight: 700, color: "#111827" }}>{cluster}</span>
                      <span style={{ color: "#6b7280" }}>
                        {data.count} Codes {data.krit3 > 0 && <span style={{ color: "#ef4444", fontWeight: 700 }}>({data.krit3} kritisch)</span>}
                      </span>
                    </div>

                const a = ampel(avg);

                      <div style={{ height: 6, background: "#f3f4f6", borderRadius: 3, overflow: "hidden" }}>

                      </div>
                    </div>
                    <span style={{ fontSize: 10, fontWeight: 700, color: a.color, minWidth: 30, textAlign: "right" }}>{avg}%</span>
                  </div>
                );
              })
            )}
            {Object.keys(roleScores).length >= 2 && (
              <div style={{ fontSize: 12, color: "#6b7280", marginTop: 8, padding: 6, background: "#f8fafc", borderRadius: 4, lineHeight: 1.5 }}>
                {(() => {
                  const entries = Object.entries(roleScores).map(([r, s]) => [r, Math.round(s.reduce((a,b) => a+b, 0)/s.length)]);
                  const sorted = entries.sort((a,b) => a[1] - b[1]);
                  const gap = sorted[sorted.length-1][1] - sorted[0][1];
                  return gap > 20
                    ? `Signifikante Bewertungsdifferenz (${gap}pp) zwischen ${ROLLEN_LABELS[sorted[0][0]]?.split("(")[0]} und ${ROLLEN_LABELS[sorted[sorted.length-1][0]]?.split("(")[0]}: Hinweis auf rollenspezifische Problemwahrnehmung.`
                    : `Konsistente Bewertungen über alle Rollen (Spread: ${gap}pp). Homogenes Qualitätsbild.`;
                })()}
              </div>
            )}
          </CardBody>
        </Card>
      </div>

      {/* Row 4: Descriptive Stats */}
      {descriptive && (
        <Card style={{ marginBottom: 16 }}>
          <CardHeader title="Verteilung der Bewertungen" subtitle={`${descriptive.n} Bewertungen insgesamt – Mittelwert, Streuung und Verteilung auf der A–D Skala`} icon={Icons.BarChart} />
          <CardBody>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: 8 }}>
              {[
                { l: "Mittelwert", v: descriptive.mean },
                { l: "Median", v: descriptive.median },
                { l: "SD", v: descriptive.sd },
                { l: "Schiefe", v: descriptive.skewness },
                { l: "IQR", v: `${descriptive.iqrData.q1}–${descriptive.iqrData.q3}` },
              ].map(s => (
                <div key={s.l} style={{ textAlign: "center", padding: "8px 4px", background: "#f8fafc", borderRadius: 6 }}>
                  <div style={{ fontSize: 18, fontWeight: 700, color: "#111827", fontFamily: "monospace" }}>{s.v}</div>
                  <div style={{ fontSize: 12, color: "#6b7280" }}>{s.l}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop: 8 }}>
              <PlotlyChart
                data={[{
                  x: ["D – kritisch", "C – Risiko", "B – Auffälligkeit", "A – keine Mängel"],
                  y: [abcdDist.D, abcdDist.C, abcdDist.B, abcdDist.A],
                  type: "bar", name: "Häufigkeit",
                  text: [abcdDist.D, abcdDist.C, abcdDist.B, abcdDist.A],
                  textposition: "outside", textfont: { size: 10 },
                  marker: { color: ["#ef4444", "#f59e0b", "#3b82f6", "#10b981"] },
                  hovertemplate: "%{x}: %{y} Bewertungen<extra>QPR-Skala ab 01.07.2026</extra>"
                }]}
                layout={{ height: 180, yaxis: { title: "Anzahl Bewertungen", dtick: 1 }, margin: { t: 10, b: 40, l: 50, r: 10 }, annotations: [{text:"D=Defizit mit Folgen · C=Defizit mit Risiko · B=Auffälligkeit ohne Risiko · A=Keine Mängel",xref:"paper",yref:"paper",x:0.5,y:-0.28,showarrow:false,font:{size:7,color:"#9ca3af"}}] }}
              />
            </div>
          </CardBody>
        </Card>
      )}

      {/* Methodology Note */}
      <Card>
        <CardBody style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.6 }}>
          <strong>Methodische Grundlage:</strong> Qualitative Leitfadeninterviews mit standardisierter A–D-Bewertung (QPR ambulant 2026). 
          Codierung: 32 Codes in 6 Clustern, 3-stufige Parsing-Engine (fragenspezifisch, Keyword-Index, global). 
          Bootstrap-KI (n=1000, BCa-korrigiert). Sensitivitätsanalyse: ±10% Gewichtungsvariation der 4 Dimensionen. 
          Datenqualität: Composite aus Vollständigkeit, Codierungsdichte und Antwortlänge.
          Quellen: QPR ambulant ab 01.07.2026, MuG ambulant (Fassung 28.04.2025), IGES Pflege-Thermometer, Stat. Landesamt NRW.
        </CardBody>
      </Card>
    </>
  );
}

function ExportModule({ data, onImport, onReset }) {
  const [mode, setMode] = useState("overview"); // "overview" | "export" | "import"
  const [importText, setImportText] = useState("");
  const [copyStatus, setCopyStatus] = useState("");
  const [cloudStatus, setCloudStatus] = useState("idle");
  const exportRef = useRef(null);

  const stats = {
    interviews: data.interviews?.length || 0,
    codings: data.codings?.length || 0,
    answers: Object.keys(data.answers || {}).length,
  };

  const exportJSON = useMemo(() => {
    try { return JSON.stringify(data, null, 2); } catch(e) { return "{}"; }
  }, [data.interviews, data.codings, data.answers]);

  const copyToClipboard = async () => {
    try {
      await navigator.clipboard.writeText(exportJSON);
      setCopyStatus("copied");
      setTimeout(() => setCopyStatus(""), 2000);
    } catch(e) {
      // Fallback: select all text in textarea
      if (exportRef.current) {
        exportRef.current.select();
        try { document.execCommand("copy"); setCopyStatus("copied"); } 
        catch(e2) { setCopyStatus("select"); }
        setTimeout(() => setCopyStatus(""), 3000);
      }
    }
  };

  const [importStatus, setImportStatus] = useState(""); // "" | "success:N" | "error:msg"

  const doImport = () => {
    if (!importText.trim()) { alert("Bitte JSON-Text einfügen."); return; }
    try {
      const imported = JSON.parse(importText);
      const iCount = imported.interviews?.length || 0;
      const cCount = imported.codings?.length || 0;
      const aCount = imported.answers ? Object.keys(imported.answers).length : 0;

      if (!confirm(`Import: ${iCount} Interviews, ${cCount} Codierungen, ${aCount} Bewertungen.\nAktuelle Daten werden überschrieben. Fortfahren?`)) return;

      onImport({
        interviews: Array.isArray(imported.interviews) ? imported.interviews : [],
        codings: Array.isArray(imported.codings) ? imported.codings : [],
        answers: imported.answers && typeof imported.answers === "object" ? imported.answers : {},
      });
      setImportText("");
      setImportStatus(`success:${iCount} Interviews importiert.`);
      setTimeout(() => setImportStatus(""), 5000);
    } catch (err) {
      alert("Ungültige JSON: " + err.message);
      setImportStatus("error:" + err.message);
    }
  };

  const manualCloudSave = async () => {
    setCloudStatus("saving");
    try {
      await speichern(data);
      setCloudStatus("done");
      setTimeout(() => setCloudStatus("idle"), 2000);
    } catch (e) { setCloudStatus("error"); }
  };

  const manualCloudLoad = async () => {
    setCloudStatus("loading");
    try {
      const stored = await laden();
      if (!stored) { setCloudStatus("error"); setTimeout(() => setCloudStatus("idle"), 2000); return; }
      onImport({
        interviews: stored.interviews || [],
        codings: stored.codings || [],
        answers: stored.answers || {},
      });
      setCloudStatus("done");
      setTimeout(() => setCloudStatus("idle"), 2000);
    } catch (e) { setCloudStatus("error"); }
  };

  return (
    <>
      <PageTitle title="Export / Import" subtitle="Datensicherung, Wiederherstellung und Server-Speicher (PHP-Backend)" />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 18 }}>
        <StatCard label="Interviews" value={stats.interviews} subtitle="im Datensatz" />
        <StatCard label="Codierungen" value={stats.codings} subtitle="im Datensatz" />
        <StatCard label="Bewertungen" value={stats.answers} subtitle="beantwortet" />
      </div>

      {/* Cloud Storage */}
      <Card style={{ marginBottom: 16, border: "2px solid var(--clr-primary)" }}>
        <CardHeader title="☁️ Server-Speicher (PHP-Backend)" subtitle="Daten werden automatisch gespeichert und beim nächsten Besuch geladen" icon={Icons.Download} />
        <CardBody>
          <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 11, color: "#6b7280" }}>
                Auto-Save ist aktiv. Daten bleiben erhalten, auch wenn Sie die Seite schließen.
              </div>
              {cloudStatus === "done" && <div style={{ fontSize: 10, color: "#10b981", fontWeight: 700, marginTop: 4 }}>✓ Erfolgreich!</div>}
              {cloudStatus === "error" && <div style={{ fontSize: 10, color: "#ef4444", fontWeight: 700, marginTop: 4 }}>✗ Fehler</div>}
            </div>
            <div style={{ display: "flex", gap: 6 }}>
              <Button onClick={manualCloudSave} disabled={cloudStatus === "saving"}>
                {cloudStatus === "saving" ? "Speichert..." : "💾 Jetzt speichern"}
              </Button>
              <Button variant="secondary" onClick={manualCloudLoad} disabled={cloudStatus === "loading"}>
                {cloudStatus === "loading" ? "Lädt..." : "📥 Vom Server laden"}
              </Button>
            </div>
          </div>
        </CardBody>
      </Card>

      {/* Action Buttons */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
        <button onClick={() => setMode(mode === "export" ? "overview" : "export")} style={{
          padding: "16px", borderRadius: 8, cursor: "pointer", textAlign: "center",
          border: mode === "export" ? "2px solid var(--clr-primary)" : "1px solid #e5e7eb",
          background: mode === "export" ? "#eef2ff" : "#fff"
        }}>
          <div style={{ fontSize: 20, marginBottom: 4 }}>📤</div>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#111827" }}>Exportieren</div>
          <div style={{ fontSize: 12, color: "#6b7280" }}>Daten als JSON kopieren</div>
        </button>
        <button onClick={() => setMode(mode === "import" ? "overview" : "import")} style={{
          padding: "16px", borderRadius: 8, cursor: "pointer", textAlign: "center",
          border: mode === "import" ? "2px solid #10b981" : "1px solid #e5e7eb",
          background: mode === "import" ? "#ecfdf5" : "#fff"
        }}>
          <div style={{ fontSize: 20, marginBottom: 4 }}>📥</div>
          <div style={{ fontSize: 12, fontWeight: 700, color: "#111827" }}>Importieren</div>
          <div style={{ fontSize: 12, color: "#6b7280" }}>JSON-Daten einfügen</div>
        </button>
      </div>

      {/* EXPORT VIEW */}
      {mode === "export" && (
        <Card style={{ marginBottom: 16 }}>
          <CardBody>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#374151" }}>
                JSON-Export ({(exportJSON.length / 1024).toFixed(1)} KB)
              </div>
              <div style={{ display: "flex", gap: 6 }}>
                <button onClick={copyToClipboard} style={{
                  padding: "6px 14px", borderRadius: 6, border: "none", fontSize: 11, fontWeight: 700, cursor: "pointer",
                  background: copyStatus === "copied" ? "#10b981" : "var(--clr-primary)", color: "#fff"
                }}>
                  {copyStatus === "copied" ? "✓ Kopiert!" : copyStatus === "select" ? "Text markiert — Strg+C" : "📋 In Zwischenablage kopieren"}
                </button>
              </div>
            </div>
            <textarea
              ref={exportRef}
              readOnly
              value={exportJSON}
              rows={12}
              onClick={e => e.target.select()}
              style={{
                width: "100%", fontSize: 12, fontFamily: "monospace", padding: 10,
                border: "1px solid #d1d5db", borderRadius: 6, boxSizing: "border-box",
                resize: "vertical", background: "#f9fafb", color: "#374151", lineHeight: 1.4
              }}
            />
            <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 4 }}>
              Anleitung: Kopieren → in Texteditor einfügen → als .json speichern
            </div>
          </CardBody>
        </Card>
      )}

      {/* IMPORT VIEW */}
      {mode === "import" && (
        <Card style={{ marginBottom: 16 }}>
          <CardBody>
            <div style={{ fontSize: 13, fontWeight: 700, color: "#111827", marginBottom: 4 }}>
              JSON-Datei importieren
            </div>
            <div style={{ fontSize: 12, color: "#6b7280", marginBottom: 16 }}>
              Wählen Sie direkt Ihre <code style={{background:"#f3f4f6",padding:"1px 5px",borderRadius:4}}>.json</code>-Datei aus — kein Copy-Paste nötig.
            </div>

            {/* FILE UPLOAD */}
            <label style={{
              display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
              gap:10, padding:"28px 20px", borderRadius:12, cursor:"pointer",
              border:"2px dashed #d1d5db", background:"#f9fafb",
              transition:"all .15s"
            }}
              onDragOver={e=>{e.preventDefault();e.currentTarget.style.borderColor="#01696f";e.currentTarget.style.background="#f0fdf4"}}
              onDragLeave={e=>{e.currentTarget.style.borderColor="#d1d5db";e.currentTarget.style.background="#f9fafb"}}
              onDrop={e=>{
                e.preventDefault();
                e.currentTarget.style.borderColor="#d1d5db";e.currentTarget.style.background="#f9fafb";
                const file=e.dataTransfer.files[0];
                if(!file)return;
                const reader=new FileReader();
                reader.onload=ev=>setImportText(ev.target.result);
                reader.readAsText(file,"utf-8");
              }}
            >
              <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#9ca3af" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <polyline points="9 15 12 12 15 15"/>
              </svg>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:600,color:"#374151"}}>Datei hierher ziehen</div>
                <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>oder klicken zum Auswählen</div>
              </div>
              <input
                type="file" accept=".json,application/json" style={{display:"none"}}
                onChange={e=>{
                  const file=e.target.files[0];
                  if(!file)return;
                  const reader=new FileReader();
                  reader.onload=ev=>setImportText(ev.target.result);
                  reader.readAsText(file,"utf-8");
                  e.target.value="";
                }}
              />
            </label>

            {/* STATUS after file load */}
            {importText.trim() && (
              <div style={{marginTop:12,padding:"10px 14px",borderRadius:8,
                background: (() => { try { JSON.parse(importText); return "#f0fdf4"; } catch(e) { return "#fef2f2"; } })(),
                border: "1px solid " + (() => { try { JSON.parse(importText); return "#86efac"; } catch(e) { return "#fca5a5"; } })()
              }}>
                {(() => {
                  try {
                    const d = JSON.parse(importText);
                    return (
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:18}}>✅</span>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:"#166534"}}>Datei erkannt</div>
                          <div style={{fontSize:12,color:"#16a34a"}}>
                            {d.interviews?.length||0} Interviews · {d.codings?.length||0} Codierungen · {Object.keys(d.answers||{}).length} Bewertungen
                          </div>
                        </div>
                      </div>
                    );
                  } catch(e) {
                    return (
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:18}}>❌</span>
                        <div>
                          <div style={{fontSize:13,fontWeight:700,color:"#991b1b"}}>Kein gültiges JSON</div>
                          <div style={{fontSize:12,color:"#b91c1c"}}>{e.message}</div>
                        </div>
                      </div>
                    );
                  }
                })()}
              </div>
            )}

            <div style={{ display: "flex", gap: 8, marginTop: 12, alignItems: "center" }}>
              <Button
                onClick={doImport}
                disabled={!importText.trim() || (() => { try { JSON.parse(importText); return false; } catch(e) { return true; } })()}
                style={{ flex: "none" }}>
                📥 Jetzt importieren
              </Button>
              {importStatus && (
                <span style={{ fontSize: 12, fontWeight: 600, color: importStatus.startsWith("success") ? "#16a34a" : "#b91c1c" }}>
                  {importStatus.startsWith("success") ? "✓ " : "✗ "}{importStatus.split(":").slice(1).join(":")}
                </span>
              )}
              {importText.trim() && (
                <button onClick={() => { setImportText(""); setImportStatus(""); }}
                  style={{ marginLeft:"auto", padding:"5px 12px", borderRadius:6, border:"1px solid #e5e7eb", background:"#fff", fontSize:12, cursor:"pointer", color:"#6b7280" }}>
                  Zurücksetzen
                </button>
              )}
            </div>
          </CardBody>
        </Card>
      )}

      {/* RESET */}
      <Card style={{ border: "1px solid #fecaca" }}>
        <CardBody>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 700, color: "#dc2626" }}>Alle Daten löschen</div>
              <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>
                Entfernt alle {stats.interviews} Interviews, {stats.codings} Codierungen und {stats.answers} Bewertungen.
              </div>
            </div>
            <button onClick={() => {
              if (!confirm("ACHTUNG: Alle Daten werden gelöscht!")) return;
              onReset();
            }} style={{
              padding: "8px 16px", borderRadius: 6, border: "1px solid #fecaca",
              background: "#fef2f2", color: "#dc2626", fontSize: 11, fontWeight: 700,
              cursor: "pointer", flexShrink: 0
            }}>
              🗑 Zurücksetzen
            </button>
          </div>
        </CardBody>
      </Card>
    </>
  );
}
