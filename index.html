const { useState, useEffect, useCallback, useMemo, useRef } = React;

function useBreakpoint() {
  const [w, setW] = useState(typeof window !== "undefined" ? window.innerWidth : 1280);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener("resize", fn, { passive: true });
    return () => window.removeEventListener("resize", fn);
  }, []);
  return { isMobile: w <= 768, isTablet: w > 768 && w <= 1024, width: w };
}

const _KEYWORD_INDEX = {};
CODEBUCH.forEach(code => {
  (code.keys || []).forEach(key => {
    if (!_KEYWORD_INDEX[key]) _KEYWORD_INDEX[key] = [];
    _KEYWORD_INDEX[key].push(code.id);
  });
});

function parseTextForCodes(text, questionId) {
  if (!text || text.length < 2) return [];
  const lowerText = text.toLowerCase();
  const suggestions = [];
  const seenCodes = new Set();

  // 1. Fragen-spezifische Muster (Score 30+)
  const muster = questionId ? ANTWORT_MUSTER[questionId] : null;
  if (muster) {
    muster.forEach(m => {
      const matchedPhrases = m.patterns.filter(p => lowerText.includes(p));
      if (matchedPhrases.length > 0) {
        // Alle Codes (auch bei positiven Patterns) als zuweisbar anzeigen
        m.codes.forEach(codeId => {
          if (seenCodes.has(codeId)) return;
          seenCodes.add(codeId);
          const code = CODEBUCH.find(c => c.id === codeId);
          if (code) suggestions.push({
            ...code, matchScore: 30 + matchedPhrases.length * 10,
            matchedPhrases, signal: m.signal, hint: m.hint,
            suggestedLikert: m.likert, confidence: "Hoch", source: "frage",
          });
        });
        // Zusätzlich: Hint-Zeile mit direktem Code-Button
        if (m.codes.length > 0) {
          suggestions.push({
            id: "_h_" + questionId + "_" + m.signal + "_" + matchedPhrases[0],
            label: m.hint, ober: "Hinweis", matchScore: 25, signal: m.signal,
            hint: m.hint, suggestedLikert: m.likert, confidence: "Info",
            source: "hint", isHint: true, linkedCodes: m.codes,
          });
        }
      }
    });
  }

  // 2. Keyword-Index aus CODEBUCH.keys (Score 18)
  Object.entries(_KEYWORD_INDEX).forEach(([keyword, codeIds]) => {
    if (lowerText.includes(keyword)) {
      codeIds.forEach(codeId => {
        if (seenCodes.has(codeId)) return;
        seenCodes.add(codeId);
        const code = CODEBUCH.find(c => c.id === codeId);
        if (code) suggestions.push({
          ...code, matchScore: 18, matchedPhrases: [keyword],
          signal: code.krit >= 3 ? "problem" : "grenzwertig",
          hint: code.label, confidence: "Mittel", source: "keyword",
        });
      });
    }
  });

  // 3. Impulse-Keywords aus Nachfrage-Impulsen (Score 12)
  // Erkennt Begriffe aus den Interviewer-Impulsen in der Antwort
  if (questionId && _IMPULSE_KEYWORDS[questionId]) {
    const impulseHits = _IMPULSE_KEYWORDS[questionId].filter(k => lowerText.includes(k));
    if (impulseHits.length > 0) {
      const q = LEITFADEN.find(f => f.id === questionId);
      if (q) {
        q.qpr.forEach(qprId => {
          const hintId = "_imp_" + questionId + "_" + qprId;
          if (!suggestions.some(s => s.id === hintId)) {
            suggestions.push({
              id: hintId, label: "Impulsbegriffe erkannt: " + impulseHits.join(", "),
              ober: "Impulse", matchScore: 12, signal: "grenzwertig",
              hint: "Nachfrage-Impulse aufgegriffen → " + qprId + " relevant",
              confidence: "Kontext", source: "impulse", isHint: true,
              linkedCodes: [], suggestedLikert: null,
            });
          }
        });
      }
    }
  }

  return suggestions.sort((a, b) => b.matchScore - a.matchScore);
}

// ============================================================================
// CORE ENGINES – WISSENSCHAFTLICH GEPRÜFT
// ============================================================================

function ampel(score) {
  if (score < 50) return { label: "Kritisch", color: "#ef4444", bg: "#fef2f2" };
  if (score < 75) return { label: "Stabil", color: "#f59e0b", bg: "#fffbeb" };
  return { label: "Stark", color: "#10b981", bg: "#ecfdf5" };
}

/**
 * Berechnet gewichtete Dimensionsscores.
 * Formel: Score_d = Σ(answer_i × weight_i) / Σ(4 × weight_i) × 100
 * Normierung auf Maximalscore (4) pro Frage × Gewicht
 */
function calculateDimensionScores(answers) {
  const scores = {};
  const maxScores = {};
  DIMENSIONEN.forEach(d => { scores[d] = 0; maxScores[d] = 0; });
  
  LEITFADEN.forEach(q => {
    const val = answers[q.id] ?? 0;
    scores[q.dimension] += val * q.gewicht;
    maxScores[q.dimension] += 4 * q.gewicht;
  });
  
  DIMENSIONEN.forEach(d => {
    scores[d] = maxScores[d] > 0 ? Math.round((scores[d] / maxScores[d]) * 100) : 0;
  });
  return scores;
}

/**
 * Org-Score = gewichteter Mittelwert der 4 Dimensionen (je 25%)
 * Gleichgewichtung bewusst gewählt: keine Dimension wird a priori privilegiert.
 * Sensitivitätsanalyse prüft Robustheit dieser Annahme.
 */
function calculateOrgScore(dimScores) {
  return Math.round(
    0.25 * (dimScores.prozess || 0) +
    0.25 * (dimScores.ressource || 0) +
    0.25 * (dimScores["qualität"] || 0) +
    0.25 * (dimScores.digital || 0)
  );
}

/**
 * QPR-Scores: Aggregation über Multi-QPR-Mapping.
 * Jede Leitfrage kann mehrere QPR-Aspekte adressieren.
 */
function calculateQPRScores(answers) {
  const scores = {};
  const maxS = {};
  QPR_ASPEKTE.forEach(a => { scores[a.id] = 0; maxS[a.id] = 0; });
  
  LEITFADEN.forEach(q => {
    const val = answers[q.id] ?? 0;
    q.qpr.forEach(aspekt => {
      if (scores[aspekt] !== undefined) {
        scores[aspekt] += val * q.gewicht;
        maxS[aspekt] += 4 * q.gewicht;
      }
    });
  });
  
  QPR_ASPEKTE.forEach(a => {
    scores[a.id] = maxS[a.id] > 0 ? Math.round((scores[a.id] / maxS[a.id]) * 100) : 0;
  });
  return scores;
}

function calculateEvidenceCoverage(codings) {
  const covered = new Set();
  codings.forEach(c => {
    const code = CODEBUCH.find(cb => cb.id === c.codeId);
    if (code) covered.add(code.qpr);
  });
  return Math.round((covered.size / QPR_ASPEKTE.length) * 100);
}

/**
 * Readiness-Score: R = 0.3×Evidenz + 0.3×Risiko + 0.2×Stabilität + 0.2×OrgScore
 * Σ Gewichte = 1.0 ✓
 */
function calculateReadiness(coverage, riskScore, stability, orga) {
  const score = coverage * 0.3 + riskScore * 0.3 + stability * 0.2 + orga * 0.2;
  let label = "Kritisch";
  if (score >= 85) label = "Audit-Ready";
  else if (score >= 70) label = "Weitgehend bereit";
  else if (score >= 50) label = "Handlungsbedarf";
  return { score: Math.round(score), label };
}

function buildHeatmapData(codings) {
  const kategorien = [...new Set(CODEBUCH.filter(c => c.krit > 0).map(c => c.ober))];
  const katLabels = kategorien.map(k => CLUSTER_LABELS[k] || k);
  const rollenLabels = ROLLEN.map(r => ROLLEN_LABELS[r]?.split("(")[0]?.trim() || r);
  const matrix = [];
  
  ROLLEN.forEach(rolle => {
    const row = [];
    kategorien.forEach(kat => {
      const count = codings.filter(c => {
        const code = CODEBUCH.find(cb => cb.id === c.codeId);
        return code && code.ober === kat && c.rolle === rolle;
      }).length;
      row.push(count);
    });
    matrix.push(row);
  });
  
  return { z: matrix, x: katLabels, y: rollenLabels };
}

// ============================================================================
// WISSENSCHAFTLICHE ANALYSE – STATISTISCHE ENGINES
// ============================================================================

const Stats = {
  mean: (arr) => (!arr || arr.length === 0) ? 0 : arr.reduce((s, v) => s + v, 0) / arr.length,
  median: (arr) => {
    if (!arr || arr.length === 0) return 0;
    const sorted = [...arr].sort((a, b) => a - b);
    const mid = Math.floor(sorted.length / 2);
    return sorted.length % 2 === 0 ? (sorted[mid - 1] + sorted[mid]) / 2 : sorted[mid];
  },
  standardDeviation: (arr) => {
    if (!arr || arr.length < 2) return 0;
    const m = Stats.mean(arr);
    return Math.sqrt(arr.reduce((s, v) => s + Math.pow(v - m, 2), 0) / (arr.length - 1));
  },
    quantile: (arr, p) => {
    if (!arr || arr.length === 0) return 0;
    const sorted = [...arr].sort((a, b) => a - b);
    const idx = (sorted.length - 1) * p;
    const lower = Math.floor(idx);
    const upper = Math.min(Math.ceil(idx), sorted.length - 1);
    const w = idx % 1;
    return sorted[lower] * (1 - w) + sorted[upper] * w;
  },
  iqr: (arr) => ({
    q25: Stats.quantile(arr, 0.25),
    q50: Stats.median(arr),
    q75: Stats.quantile(arr, 0.75),
    iqr: Stats.quantile(arr, 0.75) - Stats.quantile(arr, 0.25)
  }),
  skewness: (arr) => {
    if (!arr || arr.length < 3) return 0;
    const m = Stats.mean(arr), sd = Stats.standardDeviation(arr);
    if (sd === 0) return 0;
    const n = arr.length;
    return (n / ((n - 1) * (n - 2))) * arr.reduce((s, v) => s + Math.pow((v - m) / sd, 3), 0);
  },
};

/**
 * FIX: Bootstrap-Konfidenzintervall (Perzentil-Methode)
 * Resampling jetzt korrekt auf FRAGEN-EBENE statt Werte-Ebene
 * n=1000 Resamples, α=0.05 → 95%-KI
 */
function berechneBootstrapCI(answers, nBootstrap = 1000, alpha = 0.05) {
  const answeredIds = Object.keys(answers).filter(k => answers[k] > 0);
  if (answeredIds.length < 3) return { lower: 0, upper: 0, se: 0, width: 0, interpretation: "Zu wenige Daten" };

  const scores = [];
  for (let i = 0; i < nBootstrap; i++) {
    // Bootstrap v8.0: resample values with replacement
    const obsVals = answeredIds.map(id => Number(answers[id]) || 0);
    const resampledAnswers = {};
    for (let j = 0; j < answeredIds.length; j++) {
      resampledAnswers[answeredIds[j]] = obsVals[Math.floor(Math.random() * obsVals.length)];
    }
    const dimS = calculateDimensionScores(resampledAnswers);
    scores.push(calculateOrgScore(dimS));
  }
  scores.sort((a, b) => a - b);
  const lo = Math.max(0, Math.floor(nBootstrap * alpha / 2));
  const hi = Math.min(scores.length - 1, Math.floor(nBootstrap * (1 - alpha / 2)));
  const width = scores[hi] - scores[lo];
  return {
    lower: scores[lo], upper: scores[hi],
    se: Math.round(Stats.standardDeviation(scores) * 10) / 10,
    width,
    interpretation: width <= 10 ? "Sehr präzise Schätzung" :
      width <= 20 ? "Akzeptable Präzision" :
      width <= 30 ? "Moderate Unsicherheit" :
      "Hohe Unsicherheit – mehr Daten benötigt"
  };
}

/**
 * Sensitivitätsanalyse: ±δ Gewichtungsvariation mit Renormalisierung
 * Prüft Robustheit des gleichgewichteten 4-Dimensionen-Modells
 */
function sensitivitaetsanalyse(answers, baseWeights = [0.25, 0.25, 0.25, 0.25], delta = 0.1) {
  const dimScoresLocal = calculateDimensionScores(answers);
  const dimArr = DIMENSIONEN.map(d => dimScoresLocal[d] || 0);
  const baseScore = Math.round(baseWeights.reduce((s, w, i) => s + w * dimArr[i], 0));
  const variations = [];
  for (let i = 0; i < 4; i++) {
    for (const mult of [1 - delta, 1 + delta]) {
      const nw = [...baseWeights];
      nw[i] *= mult;
      const sum = nw.reduce((a, b) => a + b, 0);
      const norm = nw.map(w => w / sum);
      const score = Math.round(norm.reduce((s, w, j) => s + w * dimArr[j], 0));
      variations.push({
        dimension: DIM_LABELS[DIMENSIONEN[i]],
        delta: mult > 1 ? `+${Math.round(delta*100)}%` : `-${Math.round(delta*100)}%`,
        score,
        change: score - baseScore
      });
    }
  }
  const allScores = variations.map(v => v.score);
  const span = allScores.length > 0 ? Math.max(...allScores) - Math.min(...allScores) : 0;
  return {
    baseline: baseScore, variations,
    range: {
      min: allScores.length > 0 ? Math.min(...allScores) : 0,
      max: allScores.length > 0 ? Math.max(...allScores) : 0,
      span
    },
    robustness: span <= 5 ? "Sehr robust – Gewichtung unproblematisch" :
      span <= 10 ? "Robust – akzeptable Variation" :
      span <= 15 ? "Moderat sensitiv – Gewichtung prüfen" :
      "Hoch sensitiv – empirische Kalibrierung empfohlen"
  };
}

function berechneDatenqualitaet(interviews, codings, answers) {
  let score = 0;
  const answeredCount = Object.values(answers).filter(v => v > 0).length;
  const answerRate = Math.min(1, answeredCount / TOTAL_FRAGEN);
  score += answerRate * 35;
  const interviewScore = Math.min(1, interviews.length / 6);
  score += interviewScore * 25;
  const codingRate = Math.min(1, codings.length / Math.max(1, interviews.length * 5));
  score += codingRate * 20;
  const coverage = calculateEvidenceCoverage(codings);
  score += (coverage / 100) * 20;
  const s = Math.round(score);
  return {
    score: s,
    interpretation: s >= 90 ? "Exzellente Datenqualität" :
      s >= 75 ? "Gute Datenqualität" :
      s >= 60 ? "Akzeptable Datenqualität" :
      s >= 40 ? "Unzureichend – Nachbesserung erforderlich" :
      "Kritisch – systematische Verbesserung notwendig",
    components: {
      leitfragen: Math.round(answerRate * 35),
      interviews: Math.round(interviewScore * 25),
      codierungen: Math.round(codingRate * 20),
      evidenz: Math.round((coverage / 100) * 20)
    }
  };
}

        {badge && <span style={{ fontSize:11, fontWeight:700, background:"var(--clr-primary-soft)", color:"var(--clr-primary)", padding:"2px 9px", borderRadius:999, letterSpacing:"0.06em" }}>{badge}</span>}

function VeRABI() {
  const { isMobile } = useBreakpoint();
  const [mobileSidebarOpen, setMobileSidebarOpen] = useState(false);
  const [loadingUser, setLoadingUser] = useState(false);
  const [currentOrg, setCurrentOrg] = useState(null);
  const [currentUser, setCurrentUser] = useState(null);
  const [organizations, setOrganizations] = useState([]);
  const [users, setUsers] = useState([]);
  const [interviews, setInterviews] = useState([]);
  const [codings, setCodings] = useState([]);
  const [answers, setAnswers] = useState({});
  const [activeModule, setActiveModule] = useState("dashboard");
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [dataLoaded, setDataLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [lastSaved, setLastSaved] = useState(null);

  // ── Daten-Container (immer aktuell für saveNow) ──
  const saveTimerRef = useRef(null);
  const dataRef = useRef({});
  useEffect(() => {
    dataRef.current = { interviews, codings, answers, organizations, users };
  }, [interviews, codings, answers, organizations, users]);

  // ── Auto-Save: 1 Sekunde nach letzter Änderung ──
  useEffect(() => {
    if (!dataLoaded || !currentUser) return;
    if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
    saveTimerRef.current = setTimeout(async () => {
      setSaveStatus("saving");
      const ok = await speichern(dataRef.current);
      setSaveStatus(ok ? "saved" : "error");
      if (ok) setLastSaved(new Date());
      setTimeout(() => setSaveStatus("idle"), 2000);
    }, 1000);
    return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
  }, [interviews, codings, answers, dataLoaded, currentUser]);

  // ── Sofort-Speichern (für Kinder-Komponenten) ──
  const saveNow = useCallback(async (overrides = {}) => {
    const ok = await speichern({ ...dataRef.current, ...overrides });
    if (ok) setLastSaved(new Date());
  }, []);

  // ── Login: User wählen → Daten laden ──
  const login = async (user, org) => {
    setLoadingUser(true);
    const fileKey = user.fileKey || user.name.toLowerCase().replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-").replace(/^-|-$/g,"") || "default";
    setStorageUser(fileKey);
    setCurrentUser(user);
    setCurrentOrg(org);

    const stored = await laden();
    if (stored && !stored.error) {
      if (Array.isArray(stored.interviews)) setInterviews(stored.interviews);
      if (Array.isArray(stored.codings))    setCodings(stored.codings);
      if (stored.answers)                   setAnswers(stored.answers);
      if (Array.isArray(stored.organizations)) setOrganizations(stored.organizations);
      if (Array.isArray(stored.users))      setUsers(stored.users);
    } else {
      setOrganizations([org]);
      setUsers([user]);
    }
    setDataLoaded(true);
    setLoadingUser(false);
  };

  // ── Logout ──
  const logout = () => {
    speichern(dataRef.current);
    setCurrentUser(null); setCurrentOrg(null);
    setInterviews([]); setCodings([]); setAnswers({});
    setOrganizations([]); setUsers([]);
    setDataLoaded(false); setSaveStatus("idle");
  };
  // Computed values
  const dimScores = useMemo(() => calculateDimensionScores(answers), [answers]);
  const orgScore = useMemo(() => calculateOrgScore(dimScores), [dimScores]);
  const qprScores = useMemo(() => calculateQPRScores(answers), [answers]);
  const evidenceCoverage = useMemo(() => calculateEvidenceCoverage(codings), [codings]);
  const orgAmpel = useMemo(() => ampel(orgScore), [orgScore]);

  if (loadingUser) return (
    <div style={{ minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",
      background:"linear-gradient(160deg,#1c1c1e 0%,#2c2c2e 100%)",fontFamily:"var(--font-body)" }}>
      <div style={{ textAlign:"center" }}>
        <svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#007aff" strokeWidth="2.2"
          style={{ animation:"spin 1s linear infinite",margin:"0 auto 14px" }}>
          <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
        </svg>
        <div style={{ color:"rgba(255,255,255,0.5)",fontSize:14 }}>Daten werden geladen …</div>
      </div>
    </div>
  );
  if (!currentUser || !currentOrg) return <AuthScreen login={login} />;

  const MODULES = [
    { id: "dashboard", label: "Dashboard", icon: Icons.Home },
    { id: "erhebung", label: "Erhebung", icon: Icons.Users },
    { id: "audit", label: "QPR Audit", icon: Icons.Shield },
    { id: "heatmap", label: "Heatmap", icon: Icons.Grid },
    { id: "prozess", label: "Prozess", icon: Icons.Activity },
    { id: "benchmark", label: "Benchmarks", icon: Icons.BarChart },
    { id: "empfehlung", label: "Empfehlungen", icon: Icons.Zap },
    { id: "wissenschaft", label: "Wiss. Analyse", icon: Icons.TrendingUp },
    { id: "export", label: "Export", icon: Icons.Download },
  ];

  const MOBILE_TABS = ["dashboard","erhebung","audit","heatmap","export"];
  return (
    <div className="app-shell">
      {isMobile && <div className={"sb-overlay"+(mobileSidebarOpen?" open":"")} onClick={()=>setMobileSidebarOpen(false)} />}
      {/* Sidebar */}
      <aside className={"vera-sidebar"+(isMobile?" sb-drawer"+(mobileSidebarOpen?" open":""):"")} style={{ width:isMobile?240:(sidebarCollapsed?52:220), background:"linear-gradient(195deg,#1c1c1e,#2c2c2e)", color:"#cbd5e1" }}>
        {/* Logo */}
        <div style={{ padding: sidebarCollapsed ? "14px 8px" : "18px 16px", borderBottom: "1px solid rgba(255,255,255,0.06)", flexShrink:0 }}>
          {!sidebarCollapsed ? (
            <div style={{ display:"flex", alignItems:"center", gap:10 }}>
              <div style={{ width:34, height:34, borderRadius:"50%", flexShrink:0,
                background:"linear-gradient(135deg,#01696f,#4f98a3)",
                display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow:"0 2px 10px rgba(1,105,111,0.5)" }}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
              </div>
              <div style={{ minWidth:0 }}>
                <div style={{ fontSize:15, fontWeight:700, color:"#f1f5f9", fontFamily:"var(--font-display)", fontStyle:"italic", lineHeight:1.1 }}>Bonavita</div>
                <div style={{ fontSize:10, color:"#475569", letterSpacing:"0.12em", textTransform:"uppercase", marginTop:1 }}>
                  9.0 · {TOTAL_FRAGEN} Fragen
                </div>
              </div>
            </div>
          ) : (
            <div style={{ width:34, height:34, borderRadius:"50%", margin:"0 auto",
              background:"linear-gradient(135deg,#01696f,#4f98a3)",
              display:"flex", alignItems:"center", justifyContent:"center" }}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
              </svg>
            </div>
          )}
        </div>

        {/* Navigation */}
        <div style={{ flex: 1, padding: "6px 4px", overflowY: "auto" }}>
          {MODULES.map(mod => {
            const isActive = activeModule === mod.id;
            return (
              <button key={mod.id} onClick={() => setActiveModule(mod.id)} style={{
                display: "flex", alignItems: "center", gap: 8, width: "100%",
                padding: sidebarCollapsed ? "8px 0" : "7px 9px",
                justifyContent: sidebarCollapsed ? "center" : "flex-start",
                background: isActive ? "rgba(79,70,229,0.2)" : "transparent",
                border: "none", borderRadius: 5,
                color: isActive ? "#66b3ff" : "#94a3b8",
                cursor: "pointer", fontSize: 11, fontWeight: isActive ? 600 : 400,
                marginBottom: 1
              }}>
                <mod.icon size={15} />
                {!sidebarCollapsed && <span>{mod.label}</span>}
              </button>
            );
          })}
        </div>

        {/* User info, Save Status & Logout */}
        <div style={{ padding: "10px 8px", borderTop: "1px solid rgba(255,255,255,0.08)", background:"rgba(0,0,0,0.15)" }}>
          {/* Signature */}
          {!sidebarCollapsed && (
            <div style={{ padding: "4px 8px", marginBottom: 4 }}>
              <div style={{ fontSize: 10, color: "#9ca3af", letterSpacing: "0.14em", textTransform: "uppercase" }}>
                Process.Bonavita · Research
              </div>
              <div style={{ fontSize: 10, color: "#6b7280" }}>by skrollan.k</div>
            </div>
          )}

          {/* Save Status */}
          {!sidebarCollapsed && (
            <div style={{ padding: "3px 8px", marginBottom: 4, display: "flex", alignItems: "center", gap: 5 }}>
              <div style={{
                width: 6, height: 6, borderRadius: "50%",
                background: saveStatus === "saving" ? "#f59e0b" : saveStatus === "saved" ? "#10b981" : saveStatus === "error" ? "#ef4444" : "#475569",
                animation: saveStatus === "saving" ? "pulse 1s infinite" : "none"
              }} />
              <span style={{ fontSize: 12, color: "#475569" }}>
                {saveStatus === "saving" ? "💾 Speichert..." : saveStatus === "saved" ? "✓ Gespeichert" : saveStatus === "error" ? "⚠ Speicherfehler!" : lastSaved ? `✓ ${lastSaved.toLocaleTimeString("de-DE")}` : "Auto-Save aktiv"}
              </span>
            </div>
          )}
          {sidebarCollapsed && (
            <div style={{ textAlign: "center", marginBottom: 4 }}>
              <div style={{
                width: 8, height: 8, borderRadius: "50%", margin: "0 auto",
                background: saveStatus === "saving" ? "#f59e0b" : saveStatus === "saved" ? "#10b981" : saveStatus === "error" ? "#ef4444" : "#475569",
              }} />
            </div>
          )}
          {!sidebarCollapsed && (
            <div style={{ padding: "4px 8px", fontSize: 12, color: "#475569" }}>
              <div style={{ fontWeight: 600, color: "#94a3b8" }}>{currentUser.name}</div>
              <div>{currentOrg.name}</div>
            </div>
          )}
          <button onClick={logout} style={{
            display: "flex", alignItems: "center", gap: 5, width: "100%",
            padding: "6px 8px", background: "transparent", border: "none",
            color: "#ef4444", cursor: "pointer", borderRadius: 4, fontSize: 13,
            justifyContent: sidebarCollapsed ? "center" : "flex-start"
          }}>
            <Icons.LogOut size={13} /> Abmelden
          </button>
        </div>
      </aside>

      {/* Main Content */}
      <main className="main-content">
        {isMobile && (
          <div className="mobile-topbar">
            <button className="hamburger" onClick={()=>setMobileSidebarOpen(true)} aria-label="Menü öffnen">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <span style={{fontSize:15,fontWeight:700,color:"var(--clr-text)"}}>Bonavita</span>
            <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:6,fontSize:12,color:"var(--clr-muted)"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:saveStatus==="saving"?"#d97706":saveStatus==="saved"?"#16a34a":saveStatus==="error"?"#b91c1c":"#9ca3af"}}/>
              {saveStatus==="saving"?"Speichert…":saveStatus==="saved"?"Gespeichert":saveStatus==="error"?"Fehler":"Bereit"}
            </div>
          </div>
        )}
        {activeModule === "dashboard" && <DashboardModule dimScores={dimScores} orgScore={orgScore} orgAmpel={orgAmpel} qprScores={qprScores} answers={answers} interviews={interviews} codings={codings} evidenceCoverage={evidenceCoverage} />}
        {activeModule === "erhebung" && <ErhebungModule interviews={interviews} setInterviews={setInterviews} answers={answers} setAnswers={setAnswers} codings={codings} setCodings={setCodings} saveNow={saveNow} />}
        {activeModule === "audit" && <AuditModule qprScores={qprScores} evidenceCoverage={evidenceCoverage} codings={codings} dimScores={dimScores} orgScore={orgScore} />}
        {activeModule === "heatmap" && <HeatmapModule codings={codings} qprScores={qprScores} />}
        {activeModule === "prozess" && <ProzessModule answers={answers} dimScores={dimScores} />}
        {activeModule === "benchmark" && <BenchmarkModule dimScores={dimScores} />}
        {activeModule === "empfehlung" && <EmpfehlungsModule dimScores={dimScores} interviews={interviews} codings={codings} answers={answers} />}
        {activeModule === "wissenschaft" && <WissenschaftModule answers={answers} interviews={interviews} codings={codings} dimScores={dimScores} orgScore={orgScore} evidenceCoverage={evidenceCoverage} />}
        {activeModule === "export" && <ExportModule data={{ interviews, codings, answers, organizations, users }} onImport={(d) => { setInterviews(d.interviews || []); setCodings(d.codings || []); setAnswers(d.answers || {}); }} onReset={() => { setInterviews([]); setCodings([]); setAnswers({}); }} />}
      </main>
      {isMobile && (
        <nav className="mobile-tabs">
          {(typeof MODULES !== "undefined" ? MODULES : []).filter(m=>["dashboard","erhebung","audit","heatmap","export"].includes(m.id)).map(mod=>(
            <button key={mod.id} className={"tab-btn"+(activeModule===mod.id?" active":"")}
              onClick={()=>{setActiveModule(mod.id);setMobileSidebarOpen(false);}} aria-label={mod.label}>
              <mod.icon size={20}/>
              <span>{mod.label.split(" ")[0]}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

          <CardBody>
            <PlotlyChart
              data={[{
                x: DIMENSIONEN.map(d => DIM_LABELS[d]),
                y: DIMENSIONEN.map(d => dimScores[d] || 0),
                type: "bar", name: "Score %",
                text: DIMENSIONEN.map(d => `${dimScores[d] || 0}%`),
                textposition: "outside", textfont: { size: 10, color: "#374151" },
                marker: { color: DIMENSIONEN.map(d => DIM_COLORS[d]) },
                hovertemplate: "%{x}: %{y}%<extra>Grün ≥75% · Gelb 50–74% · Rot <50%</extra>"

              layout={{ height: 260, yaxis: { range: [0, 110], title: "Bewertung (%)" }, margin: { t: 20, b: 40, l: 50, r: 10 } }}

        <Card>

          <CardBody>
            <PlotlyChart
              data={[{

              layout={{ height: 260, polar: { radialaxis: { visible: true, range: [0, 100], ticksuffix: "%" } }, annotations: [{text:"QB1=Aufnahme/Risiken · QB2=Pflege · QB3=SGB V · QB4=Angehörige · QB5=QM/Orga",xref:"paper",yref:"paper",x:0.5,y:-0.08,showarrow:false,font:{size:8,color:"#9ca3af"}}] }}
            />

        </Card>
      </div>

      {/* Ampelbewertung */}
      <Card>
        <CardHeader title="Ampelbewertung" subtitle="< 50% Kritisch · 50–74% Stabil · ≥ 75% Stark" icon={Icons.AlertTriangle} />
        <CardBody>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 8 }}>
            {DIMENSIONEN.map(d => {
              const score = dimScores[d] || 0;
              const a = ampel(score);
              return (
                <div key={d} style={{ padding: 12, borderRadius: 8, background: a.bg, textAlign: "center" }}>
                  <div style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", textTransform: "uppercase", letterSpacing: 0.8 }}>{DIM_LABELS[d]}</div>

      </Card>

}

// SMART TEXTAREA – Live-Eingabe mit Zeichenzähler und Auto-Resize
// ════════════════════════════════════════════════════════════════════════════

function SmartTextarea({ value, onChange, onBlur, placeholder, minRows = 3 }) {
  const ref = useRef(null);
  const charCount = (value || "").length;

  // Auto-resize
  useEffect(() => {
    if (ref.current) {
      ref.current.style.height = "auto";
      ref.current.style.height = Math.max(ref.current.scrollHeight, minRows * 22) + "px";
    }
  }, [value, minRows]);

  return (
    <div>
      <textarea
        ref={ref}
        value={value || ""}
        onChange={e => onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          width: "100%", padding: "10px 12px",
          border: "1px solid #d1d5db", borderRadius: 8,
          fontSize: 12, fontFamily: "inherit", lineHeight: 1.6,
          resize: "vertical", boxSizing: "border-box",
          background: "#fff", transition: "border-color 0.2s",
          minHeight: minRows * 22 + 20,
        }}
        onFocus={e => e.target.style.borderColor = "var(--clr-primary)"}
        onBlur={e => { e.target.style.borderColor = "#d1d5db"; if (onBlur) onBlur(); }}
      />
      <div style={{ display: "flex", justifyContent: "space-between", padding: "2px 4px" }}>
        <span style={{ fontSize: 12, color: charCount > 20 ? "#10b981" : "#d1d5db" }}>
          {charCount > 20 ? "✓ Genug Text für Auto-Coding" : ""}
        </span>
        <span style={{ fontSize: 12, color: "#9ca3af" }}>{charCount} Zeichen</span>
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════════════════════════════
// ERHEBUNG MODULE v4 – Perfektionierte Codierungs-UX
// ════════════════════════════════════════════════════════════════════════════

function ErhebungModule({ interviews, setInterviews, answers, setAnswers, codings, setCodings, saveNow }) {
  const [mode, setMode] = useState("list");
  const [localFreitext, setLocalFreitext] = useState("");
  const [activeInterviewId, setActiveInterviewId] = useState(null);
  const [questionIndex, setQuestionIndex] = useState(0);
  const [codeSearch, setCodeSearch] = useState("");
  const [flashCodes, setFlashCodes] = useState(new Set());
  const [prevSuggestionIds, setPrevSuggestionIds] = useState(new Set());
  const searchRef = useRef(null);

  const activeInterview = interviews.find(i => i.id === activeInterviewId);

  // Sync lokaler Textarea-State wenn Frage/Interview wechselt → verhindert Fokus-Verlust
  useEffect(() => {
    const val = currentQuestion
      ? (activeInterview?.antworten?.[currentQuestion.id] || "")
      : "";
    setLocalFreitext(val);
  }, [activeInterviewId, questionIndex]);
  const activeQuestions = useMemo(
    () => activeInterview ? getQuestionsForRole(activeInterview.role) : [],
    [activeInterviewId, interviews]
  );
  const currentQuestion = activeQuestions[questionIndex] || null;
  const freitextValue = currentQuestion ? (activeInterview?.antworten?.[currentQuestion.id] || "") : "";
  const likertValue = currentQuestion ? (answers[currentQuestion.id] || 0) : 0;

  // Live auto-coding with flash detection
  const liveSuggestions = useMemo(() => {
    if (!freitextValue || freitextValue.length < 5) return [];
    return parseTextForCodes(freitextValue, currentQuestion?.id);
  }, [freitextValue, currentQuestion?.id]);

  // Flash new codes when they appear
  useEffect(() => {
    const currentIds = new Set(liveSuggestions.filter(s => !s.isHint).map(s => s.id));
    const newIds = [...currentIds].filter(id => !prevSuggestionIds.has(id));
    if (newIds.length > 0) {
      setFlashCodes(new Set(newIds));
      setTimeout(() => setFlashCodes(new Set()), 1200);
    }
    setPrevSuggestionIds(currentIds);
  }, [liveSuggestions]);

  const questionCodings = useMemo(() =>
    codings.filter(c => c.interviewId === activeInterviewId && c.questionId === currentQuestion?.id),
    [codings, activeInterviewId, currentQuestion?.id]
  );

  const filteredCodes = useMemo(() => {
    if (!codeSearch.trim()) return [];
    const s = codeSearch.toLowerCase();
    return CODEBUCH.filter(c =>
      c.id.toLowerCase().includes(s) || c.label.toLowerCase().includes(s) ||
      c.ober.toLowerCase().includes(s) || (c.keys || []).some(k => k.includes(s))
    );
  }, [codeSearch]);

  // ── ACTIONS ──
  // saveNow kommt als Prop vom VeRABI-Parent (korrekte Scope-Referenzen)

  const createInterview = (role) => {
    const count = interviews.filter(i => i.role === role).length + 1;
    const label = ROLLEN_LABELS[role] || role;
    const newInt = {
      id: "int-" + Date.now(), role,
      name: `${label} #${count}`,
      antworten: {}, date: new Date().toISOString(), completed: false
    };
    setInterviews(prev => {
      const next = [...prev, newInt];
      // Sofort speichern bei Interview-Erstellung
      setTimeout(() => saveNow({ interviews: next }), 100);
      return next;
    });
    setActiveInterviewId(newInt.id);
    setQuestionIndex(0);
    setMode("conduct");
  };

  // Nur lokalen State updaten während der Eingabe → kein Re-render der ganzen App
  const saveFreitext = (text) => {
    setLocalFreitext(text);
  };

  // Erst beim Verlassen des Feldes (blur) in globalen interviews-State schreiben
  const commitFreitext = useCallback((frageId, text) => {
    if (!frageId) return;
    setInterviews(prev => prev.map(i =>
      i.id === activeInterviewId ? { ...i, antworten: { ...i.antworten, [frageId]: text } } : i
    ));
  }, [activeInterviewId]);

  const saveLikert = (frageId, value) => {
    setAnswers(prev => ({ ...prev, [frageId]: value }));
  };

  const addCoding = (codeId) => {
    if (!codeId || codeId.startsWith("_h_")) return;
    if (questionCodings.some(c => c.codeId === codeId)) return;
    setCodings(prev => [...prev, {
      id: "c-" + Date.now() + Math.random().toString(36).slice(2, 5),
      interviewId: activeInterviewId,
      questionId: currentQuestion?.id || "",
      codeId,
      rolle: activeInterview?.role || "PDL",
      date: new Date().toISOString()
    }]);
  };

  const removeCoding = (id) => setCodings(prev => prev.filter(c => c.id !== id));

  const acceptAll = () => {
    liveSuggestions.filter(s => s.matchScore >= 15 && !s.isHint && !questionCodings.some(c => c.codeId === s.id)).forEach(s => addCoding(s.id));
  };

  const completeInterview = () => {
    setInterviews(prev => {
      const next = prev.map(i =>
        i.id === activeInterviewId ? { ...i, completed: true } : i
      );
      setTimeout(() => saveNow({ interviews: next }), 100);
      return next;
    });
    setMode("list");
    setActiveInterviewId(null);
  };

  const deleteInterview = (id) => {
    const iv = interviews.find(i => i.id === id);
    if (!confirm(`Interview "${iv?.name || id}" wirklich löschen?`)) return;
    setInterviews(prev => prev.filter(i => i.id !== id));
    setCodings(prev => prev.filter(c => c.interviewId !== id));
    if (iv) {
      const qs = getQuestionsForRole(iv.role);
      const otherInterviews = interviews.filter(i => i.id !== id);
      const otherQuestionIds = new Set(otherInterviews.flatMap(i => getQuestionsForRole(i.role).map(q => q.id)));
      setAnswers(prev => {
        const next = { ...prev };
        qs.forEach(q => { if (!otherQuestionIds.has(q.id)) delete next[q.id]; });
        return next;
      });
    }
    if (activeInterviewId === id) { setActiveInterviewId(null); setMode("list"); }
  };

  const renameInterview = (id) => {
    const iv = interviews.find(i => i.id === id);
    const currentName = iv?.name || "";
    const input = prompt("Neuen Interviewnamen eingeben (z.B. 'Pflegefachkraft A'):", currentName);
    if (!input || !input.trim()) return;
    const newName = input.trim();
    setInterviews(prev => {
      const next = prev.map(i => i.id === id ? { ...i, name: newName } : i);
      setTimeout(() => saveNow({ interviews: next }), 120);
      return next;
    });
  };

  // Keyboard shortcuts
  useEffect(() => {
    if (mode !== "conduct") return;
    const handler = (e) => {
      if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA" || e.target.tagName === "SELECT") return;
      if (e.key === "ArrowRight" || e.key === "n") { e.preventDefault(); setQuestionIndex(i => Math.min(i + 1, activeQuestions.length - 1)); }
      if (e.key === "ArrowLeft" || e.key === "p") { e.preventDefault(); setQuestionIndex(i => Math.max(i - 1, 0)); }
      if (e.key === "/") { e.preventDefault(); searchRef.current?.focus(); }
      if (e.key === "a" && e.ctrlKey) { e.preventDefault(); acceptAll(); }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [mode, questionIndex, activeQuestions, liveSuggestions]);

  const totalComplete = activeQuestions.filter(q =>
    (activeInterview?.antworten?.[q.id]?.trim()) && (answers[q.id] || 0) > 0
  ).length;
  const progress = activeQuestions.length ? Math.round((totalComplete / activeQuestions.length) * 100) : 0;

  // Role colors
  const roleColor = (role) => ({
    PDL: "#7c3aed", stvPDL: "#6366f1", Exam: "#2563eb",
    Hilfskraft: "#0891b2", Ungelernt: "#65a30d", Verwaltung: "#d97706"
  }[role] || "#6b7280");

  // ════════════════════════════════════════════════════════════════
  // LIST VIEW
  // ════════════════════════════════════════════════════════════════
  if (mode === "list") {
    return (
      <>
        <PageTitle title="Erhebung" subtitle={`${interviews.length} Interviews · ${codings.length} Codierungen`} />

        <Card style={{ marginBottom: 16 }}>
          <CardBody>
            <div style={{ fontSize: 11, fontWeight: 700, color: "#374151", marginBottom: 10 }}>
              Neues Interview starten:
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(170px, 1fr))", gap: 8 }}>
              {ROLLEN.map(role => {
                const count = interviews.filter(i => i.role === role).length;
                const c = roleColor(role);
                return (
                  <button key={role} onClick={() => createInterview(role)} style={{
                    padding: "12px 14px", borderRadius: 8, border: `2px solid ${c}20`,
                    background: `linear-gradient(135deg, ${c}05, ${c}12)`,
                    cursor: "pointer", textAlign: "left", transition: "all 0.15s"
                  }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = c; e.currentTarget.style.transform = "translateY(-1px)"; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = `${c}20`; e.currentTarget.style.transform = "none"; }}
                  >
                    <div style={{ fontSize: 12, fontWeight: 700, color: c }}>
                      {ROLLEN_KURZ[role]} {ROLLEN_LABELS[role]?.split("(")[0]?.trim()}
                    </div>
                    <div style={{ fontSize: 10, color: "#6b7280", marginTop: 2 }}>
                      {getQuestionsForRole(role).length} Fragen{count > 0 ? ` · ${count} vorhanden` : ""}
                    </div>
                  </button>
                );
              })}
            </div>
          </CardBody>
        </Card>

        {interviews.length > 0 && (
          <Card>
            <CardBody>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#374151", marginBottom: 10 }}>
                Interviews ({interviews.length})
              </div>
              {interviews.map(iv => {
                const qs = getQuestionsForRole(iv.role);
                const answered = qs.filter(q => iv.antworten?.[q.id]?.trim()).length;
                const coded = codings.filter(c => c.interviewId === iv.id).length;
                const pct = qs.length ? Math.round((answered / qs.length) * 100) : 0;
                const c = roleColor(iv.role);
                return (
                  <div key={iv.id} style={{
                    display: "flex", alignItems: "center", gap: 12, padding: "10px 12px",
                    borderRadius: 8, border: "1px solid #e5e7eb", marginBottom: 6,
                    background: iv.completed ? "#f0fdf4" : "#fff"
                  }}>
                    <div style={{
                      width: 40, height: 40, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center",
                      background: `${c}15`, color: c, fontSize: 11, fontWeight: 800, flexShrink: 0
                    }}>
                      {ROLLEN_KURZ[iv.role]}
                    </div>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: "#111827" }}>{iv.name}</div>
                      <div style={{ fontSize: 10, color: "#6b7280", display: "flex", gap: 10, marginTop: 2 }}>
                        <span>{answered}/{qs.length} Fragen</span>
                        <span>{coded} Codes</span>
                        {iv.completed && <span style={{ color: "#10b981", fontWeight: 600 }}>✓ Fertig</span>}
                      </div>
                      <div style={{ height: 3, background: "#f3f4f6", borderRadius: 2, marginTop: 4 }}>
                        <div style={{ height: "100%", width: `${pct}%`, background: iv.completed ? "#10b981" : c, borderRadius: 2, transition: "width 0.3s" }} />
                      </div>
                    </div>
                    <div style={{ display: "flex", gap: 4, flexShrink: 0 }}>
                      <button onClick={() => { setActiveInterviewId(iv.id); setQuestionIndex(0); setMode("conduct"); }}
                        style={{ padding: "6px 12px", borderRadius: 6, border: "none", background: c, color: "#fff", fontSize: 10, fontWeight: 600, cursor: "pointer" }}>
                        {iv.completed ? "Ansehen" : "Fortsetzen"}
                      </button>
                      <button onClick={() => renameInterview(iv.id)}
                        style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #d1d5db", background: "#fff", color: "#374151", fontSize: 10, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>
                        {"✏️"} Umbenennen
                      </button>
                      <button onClick={() => deleteInterview(iv.id)}
                        style={{ padding: "6px 10px", borderRadius: 6, border: "1px solid #fecaca", background: "#fef2f2", color: "#ef4444", fontSize: 10, fontWeight: 600, cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>
                        {"✕"} Löschen
                      </button>
                    </div>
                  </div>
                );
              })}
            </CardBody>
          </Card>
        )}

        {interviews.length === 0 && (
          <div style={{ textAlign: "center", padding: 40, color: "#9ca3af" }}>
            <div style={{ fontSize: 32, marginBottom: 8 }}>📋</div>
            <div style={{ fontSize: 14, fontWeight: 600 }}>Noch keine Interviews</div>
            <div style={{ fontSize: 11, marginTop: 4 }}>Rolle oben anklicken zum Starten</div>
          </div>
        )}
      </>
    );
  }

  // ════════════════════════════════════════════════════════════════
  // CONDUCT VIEW
  // ════════════════════════════════════════════════════════════════
  if (!activeInterview || !currentQuestion) {
    setMode("list");
    return null;
  }

  const likertOptions = [
    { val: 1, label: "D", desc: "kritisch", color: "#ef4444", bg: "#fef2f2" },
    { val: 2, label: "C", desc: "Risiko", color: "#f59e0b", bg: "#fffbeb" },
    { val: 3, label: "B", desc: "Auffälligkeit", color: "#3b82f6", bg: "#eff6ff" },
    { val: 4, label: "A", desc: "keine Mängel", color: "#10b981", bg: "#ecfdf5" },
  ];

  const signalStyle = (signal) => ({
    bg: signal === "problem" ? "#fef2f2" : signal === "positiv" ? "#f0fdf4" : "#fffbeb",
    border: signal === "problem" ? "#fecaca" : signal === "positiv" ? "#bbf7d0" : "#fde68a",
    icon: signal === "problem" ? "🔴" : signal === "positiv" ? "🟢" : "🟡"
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", height: "calc(100vh - 60px)", overflow: "hidden" }}>
      {/* Top bar */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "6px 12px", background: "#f8fafc", borderBottom: "1px solid #e5e7eb", flexShrink: 0 }}>
        <button onClick={() => { setMode("list"); setActiveInterviewId(null); }} style={{ padding: "4px 10px", borderRadius: 4, border: "1px solid #d1d5db", background: "#fff", fontSize: 10, cursor: "pointer" }}>
          ← Zurück zur Liste
        </button>
        <div style={{ fontSize: 11, fontWeight: 700, color: "#374151" }}>{activeInterview.name}</div>
        <Badge label={ROLLEN_KURZ[activeInterview.role]} color={roleColor(activeInterview.role)} bg={roleColor(activeInterview.role) + "15"} />
        <div style={{ flex: 1 }} />
        <span style={{ fontSize: 12, color: "#6b7280" }}>{questionIndex + 1}/{activeQuestions.length}</span>
        <div style={{ width: 80, height: 4, background: "#e5e7eb", borderRadius: 2 }}>
          <div style={{ height: "100%", width: `${progress}%`, background: "#10b981", borderRadius: 2 }} />
        </div>
        <span style={{ fontSize: 12, color: "#6b7280" }}>{progress}%</span>
        {progress >= 70 && (
          <button onClick={completeInterview} style={{ padding: "4px 10px", borderRadius: 4, border: "none", background: "#10b981", color: "#fff", fontSize: 10, fontWeight: 600, cursor: "pointer" }}>
            ✓ Abschliessen
          </button>
        )}
      </div>

      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {/* LEFT: Question navigator */}
        <div style={{ width: 150, borderRight: "1px solid #e5e7eb", overflowY: "auto", background: "#fafbfc", flexShrink: 0, padding: "4px 0" }}>
          {activeQuestions.map((q, i) => {
            const hasText = !!activeInterview.antworten?.[q.id]?.trim();
            const hasLikert = (answers[q.id] || 0) > 0;
            const codeCount = codings.filter(c => c.interviewId === activeInterviewId && c.questionId === q.id).length;
            const isActive = i === questionIndex;
            const done = hasText && hasLikert;
            return (
              <button key={q.id} onClick={() => setQuestionIndex(i)} style={{
                display: "block", width: "100%", padding: "5px 8px", border: "none", textAlign: "left",
                background: isActive ? "#eef2ff" : "transparent", borderLeft: isActive ? "3px solid var(--clr-primary)" : "3px solid transparent",
                cursor: "pointer", fontSize: 12, transition: "all 0.1s"
              }}>
                <div style={{ display: "flex", alignItems: "center", gap: 3 }}>
                  <span style={{ fontWeight: 700, color: isActive ? "var(--clr-primary)" : done ? "#10b981" : "#9ca3af", fontSize: 10 }}>{q.id}</span>
                  {codeCount > 0 && <span style={{ fontSize: 7, fontWeight: 700, color: "#fff", background: "var(--clr-primary)", borderRadius: 6, padding: "0 4px", lineHeight: "14px" }}>{codeCount}</span>}
                  {done && <span style={{ fontSize: 12, color: "#10b981", marginLeft: "auto" }}>✓</span>}
                </div>
                <div style={{ fontSize: 12, color: "#9ca3af", marginTop: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {q.text.slice(0, 35)}...
                </div>
              </button>
            );
          })}
        </div>

        {/* CENTER: Question + Answer + Likert */}
        <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
          {/* Question */}
          <div style={{ marginBottom: 12 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 6 }}>
              <span style={{ fontSize: 15, fontWeight: 800, color: "var(--clr-primary)" }}>{currentQuestion.id}</span>
              <Badge label={currentQuestion.block} color="#6b7280" bg="#f3f4f6" />
              {currentQuestion.pflicht && <Badge label="Pflicht" color="#ef4444" bg="#fef2f2" />}
              <div style={{ flex: 1 }} />
              <button onClick={() => { saveNow(); setQuestionIndex(i => Math.max(i - 1, 0)); }} disabled={questionIndex === 0}
                style={{ padding: "3px 10px", borderRadius: 4, border: "1px solid #d1d5db", background: "#fff", fontSize: 13, cursor: "pointer", opacity: questionIndex === 0 ? 0.3 : 1 }}>← Vorige</button>
              <button onClick={() => { saveNow(); setQuestionIndex(i => Math.min(i + 1, activeQuestions.length - 1)); }} disabled={questionIndex >= activeQuestions.length - 1}
                style={{ padding: "3px 10px", borderRadius: 4, border: "1px solid #d1d5db", background: "#fff", fontSize: 13, cursor: "pointer", opacity: questionIndex >= activeQuestions.length - 1 ? 0.3 : 1 }}>Nächste →</button>
            </div>
            <div style={{ fontSize: 14, fontWeight: 600, color: "#111827", lineHeight: 1.4 }}>
              {currentQuestion.text}
            </div>
            {currentQuestion.impulse && (
              <div style={{ fontSize: 10, color: "#8b5cf6", marginTop: 4, fontStyle: "italic", background: "#f5f3ff", padding: "4px 8px", borderRadius: 4 }}>
                Nachfragen: {currentQuestion.impulse}
              </div>
            )}
          </div>

          {/* Textarea */}
          <SmartTextarea
            value={localFreitext}
            onChange={saveFreitext}
            onBlur={() => {
              commitFreitext(currentQuestion?.id, localFreitext);
              saveNow();
            }}
            placeholder="Antwort der befragten Person eingeben..."
            minRows={5}
          />

          {/* Likert */}
          <div style={{ marginTop: 10 }}>
            <div style={{ fontSize: 10, fontWeight: 600, color: "#6b7280", marginBottom: 4 }}>Bewertung (QPR-konform A–D):</div>
            <div style={{ display: "flex", gap: 6 }}>
              {likertOptions.map(opt => (
                <button key={opt.val} onClick={() => saveLikert(currentQuestion.id, opt.val)} style={{
                  flex: 1, padding: "8px 4px", borderRadius: 6,
                  border: `2px solid ${likertValue === opt.val ? opt.color : "#e5e7eb"}`,
                  background: likertValue === opt.val ? opt.bg : "#fff",
                  cursor: "pointer", transition: "all 0.15s", textAlign: "center"
                }}>
                  <div style={{ fontSize: 16, fontWeight: 800, color: likertValue === opt.val ? opt.color : "#d1d5db" }}>{opt.label}</div>
                  <div style={{ fontSize: 12, color: likertValue === opt.val ? opt.color : "#9ca3af" }}>{opt.desc}</div>
                </button>
              ))}
            </div>
          </div>

          {/* Assigned codes as inline badges */}
          {questionCodings.length > 0 && (
            <div style={{ marginTop: 10, display: "flex", flexWrap: "wrap", gap: 4 }}>
              <span style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", lineHeight: "22px" }}>Codes:</span>
              {questionCodings.map(c => {
                const code = CODEBUCH.find(cb => cb.id === c.codeId);
                return (
                  <span key={c.id} style={{
                    display: "inline-flex", alignItems: "center", gap: 4, padding: "3px 8px",
                    borderRadius: 12, background: code?.color ? code.color + "15" : "#ecfdf5",
                    border: `1px solid ${code?.color || "#a7f3d0"}30`, fontSize: 9
                  }}>
                    <strong style={{ color: code?.color || "#065f46" }}>{c.codeId}</strong>
                    <span style={{ color: "#374151" }}>{code?.label}</span>
                    <button onClick={() => removeCoding(c.id)} style={{
                      background: "none", border: "none", color: "#ef4444", cursor: "pointer", fontSize: 11, padding: 0, marginLeft: 2, lineHeight: 1
                    }}>×</button>
                  </span>
                );
              })}
            </div>
          )}
        </div>

        {/* RIGHT: Code suggestions panel */}
        <div style={{ width: 270, borderLeft: "1px solid #e5e7eb", overflowY: "auto", padding: 8, background: "#fafbfc", flexShrink: 0 }}>
          {/* Search */}
          <div style={{ position: "relative", marginBottom: 8 }}>
            <input ref={searchRef} type="text" value={codeSearch} onChange={e => setCodeSearch(e.target.value)}
              placeholder="Code suchen... (Taste /)" style={{
                width: "100%", padding: "6px 8px 6px 24px", borderRadius: 6, border: "1px solid #d1d5db",
                fontSize: 10, boxSizing: "border-box", background: "#fff"
              }} />
            <span style={{ position: "absolute", left: 8, top: 7, fontSize: 10, color: "#9ca3af" }}>🔍</span>
          </div>

          {/* Search results */}
          {codeSearch && filteredCodes.length > 0 && (
            <div style={{ marginBottom: 8, padding: 6, background: "#fff", borderRadius: 6, border: "1px solid #e5e7eb" }}>
              {filteredCodes.slice(0, 8).map(code => {
                const assigned = questionCodings.some(c => c.codeId === code.id);
                return (
                  <button key={code.id} onClick={() => { addCoding(code.id); setCodeSearch(""); }} disabled={assigned} style={{
                    display: "flex", alignItems: "center", gap: 6, padding: "5px 6px", borderRadius: 4,
                    border: "none", background: assigned ? "#f0fdf4" : "transparent",
                    cursor: assigned ? "default" : "pointer", fontSize: 12, width: "100%", textAlign: "left",
                    opacity: assigned ? 0.5 : 1
                  }}>
                    <span style={{ width: 6, height: 6, borderRadius: "50%", background: code.color, flexShrink: 0 }} />
                    <span style={{ fontWeight: 700, color: "var(--clr-primary)", minWidth: 36 }}>{code.id}</span>
                    <span style={{ color: "#374151", flex: 1 }}>{code.label}</span>
                    {assigned && <span style={{ fontSize: 12, color: "#10b981" }}>✓</span>}
                  </button>
                );
              })}
            </div>
          )}

          {/* Accept all button */}
          {liveSuggestions.filter(s => s.matchScore >= 15 && !s.isHint && !questionCodings.some(c => c.codeId === s.id)).length > 0 && (
            <button onClick={acceptAll} style={{
              width: "100%", padding: "6px 8px", borderRadius: 6, border: "1px solid #a7f3d0",
              background: "#ecfdf5", color: "#065f46", fontSize: 10, fontWeight: 600,
              cursor: "pointer", marginBottom: 8, display: "flex", alignItems: "center", gap: 6, justifyContent: "center"
            }}>
              <span style={{ fontSize: 12 }}>\u26A1</span>
              Alle {liveSuggestions.filter(s => s.matchScore >= 15 && !s.isHint && !questionCodings.some(c => c.codeId === s.id)).length} erkannten Codes zuweisen
              <kbd style={{ fontSize: 7, background: "#d1fae5", padding: "1px 4px", borderRadius: 2 }}>Ctrl+A</kbd>
            </button>
          )}

          {/* Live suggestions */}
          {liveSuggestions.length > 0 && (
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: "var(--clr-primary)", marginBottom: 4, display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 11 }}>\u26A1</span> Erkannte Codes ({liveSuggestions.filter(s => !s.isHint).length})
              </div>
              {liveSuggestions.slice(0, 10).map((s, i) => {
                const assigned = !s.isHint && questionCodings.some(c => c.codeId === s.id);
                const isFlashing = flashCodes.has(s.id);
                const ss = signalStyle(s.signal);

                if (s.isHint) {
                  return (
                    <div key={s.id} style={{ padding: "5px 8px", borderRadius: 6, marginBottom: 3, background: ss.bg, border: `1px solid ${ss.border}`, fontSize: 12, display: "flex", alignItems: "flex-start", gap: 6 }}>
                      <span>{ss.icon}</span>
                      <div style={{ flex: 1 }}>
                        <span style={{ fontWeight: 700 }}>{s.hint}</span>
                        {/* Linked codes as clickable badges */}
                        {s.linkedCodes && s.linkedCodes.length > 0 && (
                          <div style={{ display: "flex", flexWrap: "wrap", gap: 3, marginTop: 3 }}>
                            {s.linkedCodes.map(cId => {
                              const lc = CODEBUCH.find(c2 => c2.id === cId);
                              const alreadyAssigned = questionCodings.some(c2 => c2.codeId === cId);
                              return lc ? (
                                <button key={cId} onClick={() => !alreadyAssigned && addCoding(cId)} disabled={alreadyAssigned} style={{
                                  display: "inline-flex", alignItems: "center", gap: 3, padding: "2px 6px",
                                  borderRadius: 4, border: `1px solid ${lc.color}40`,
                                  background: alreadyAssigned ? "#f0fdf4" : `${lc.color}10`,
                                  cursor: alreadyAssigned ? "default" : "pointer", fontSize: 12,
                                  opacity: alreadyAssigned ? 0.5 : 1
                                }}>
                                  <span style={{ width: 5, height: 5, borderRadius: "50%", background: lc.color }} />
                                  <strong style={{ color: "var(--clr-primary)" }}>{cId}</strong>
                                  <span style={{ color: "#374151" }}>{lc.label.slice(0, 25)}</span>
                                  {alreadyAssigned && <span style={{ color: "#10b981" }}>{"✓"}</span>}
                                </button>
                              ) : null;
                            })}
                          </div>
                        )}
                        <div style={{ display: "flex", gap: 6, marginTop: 3, alignItems: "center" }}>
                          {s.suggestedLikert && (
                            <button onClick={() => saveLikert(currentQuestion.id, s.suggestedLikert)} style={{ padding: "1px 8px", borderRadius: 4, fontSize: 12, fontWeight: 700, background: "#8b5cf6", color: "#fff", border: "none", cursor: "pointer" }}>
                              {["","D","C","B","A"][s.suggestedLikert]} setzen
                            </button>
                          )}
                        </div>
                      </div>
                    </div>
                  );
                }

                return (
                  <div key={s.id} style={{
                    padding: "5px 8px", borderRadius: 6, marginBottom: 3,
                    background: isFlashing ? "#dbeafe" : assigned ? "#f0fdf4" : ss.bg,
                    border: `1px solid ${isFlashing ? "#93c5fd" : assigned ? "#d1fae5" : ss.border}`,
                    opacity: assigned ? 0.5 : 1,
                    transition: "all 0.3s",
                    animation: isFlashing ? "vera-flash 0.6s ease-out 2" : "none"
                  }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 9 }}>
                      <span>{ss.icon}</span>
                      <span style={{ width: 6, height: 6, borderRadius: "50%", background: s.color || "#6b7280", flexShrink: 0 }} />
                      <button onClick={() => !assigned && addCoding(s.id)} disabled={assigned} style={{
                        display: "flex", alignItems: "center", gap: 4, flex: 1, background: "none", border: "none",
                        cursor: assigned ? "default" : "pointer", padding: 0, fontSize: 12, textAlign: "left"
                      }}>
                        <strong style={{ color: "var(--clr-primary)" }}>{s.id}</strong>
                        <span style={{ color: "#374151" }}>{s.label}</span>
                        {assigned && <span style={{ marginLeft: "auto", color: "#10b981" }}>✓</span>}
                      </button>
                    </div>
                    {s.hint && <div style={{ fontSize: 12, color: "#6b7280", marginTop: 2, paddingLeft: 20 }}>{s.hint}</div>}
                    {s.matchedPhrases && s.matchedPhrases.length > 0 && (
                      <div style={{ fontSize: 7, color: "#9ca3af", marginTop: 1, paddingLeft: 20 }}>
                        {s.matchedPhrases.slice(0, 3).map((p, pi) => (
                          <span key={pi} style={{ background: "#fef3c7", padding: "0 3px", borderRadius: 2, marginRight: 3 }}>{p}</span>
                        ))}
                      </div>
                    )}
                    {s.suggestedLikert && !assigned && (
                      <div style={{ fontSize: 12, marginTop: 2, paddingLeft: 20 }}>
                        <button onClick={() => saveLikert(currentQuestion.id, s.suggestedLikert)} style={{
                          padding: "1px 8px", borderRadius: 4, fontSize: 12, fontWeight: 600,
                          background: "#8b5cf6", color: "#fff", border: "none", cursor: "pointer"
                        }}>
                          {["","D","C","B","A"][s.suggestedLikert]} setzen
                        </button>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* Full codebook by cluster */}
          <details style={{ marginTop: 4 }}>
            <summary style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", cursor: "pointer", padding: "4px 0" }}>
              Codebuch ({CODEBUCH.length} Codes)
            </summary>
            <div style={{ marginTop: 4 }}>
              {CODE_CLUSTER.map(cluster => (
                <details key={cluster} style={{ marginBottom: 4 }}>
                  <summary style={{ fontSize: 12, fontWeight: 700, color: "#374151", cursor: "pointer", padding: "3px 0" }}>
                    {cluster} ({CODE_BY_CLUSTER[cluster].length})
                  </summary>
                  {CODE_BY_CLUSTER[cluster].map(code => {
                    const assigned = questionCodings.some(c2 => c2.codeId === code.id);
                    return (
                      <button key={code.id} onClick={() => addCoding(code.id)} disabled={assigned} style={{
                        display: "flex", alignItems: "center", gap: 4, padding: "4px 6px", borderRadius: 4,
                        border: "none", background: assigned ? "#f0fdf4" : "transparent",
                        cursor: assigned ? "default" : "pointer", fontSize: 12, width: "100%", textAlign: "left",
                        opacity: assigned ? 0.5 : 1
                      }}>
                        <span style={{ width: 5, height: 5, borderRadius: "50%", background: code.color, flexShrink: 0 }} />
                        <span style={{ fontWeight: 700, color: "var(--clr-primary)", minWidth: 34 }}>{code.id}</span>
                        <span style={{ color: "#374151", flex: 1 }}>{code.label}</span>
                        {assigned && <span style={{ fontSize: 7, color: "#10b981" }}>✓</span>}
                      </button>
                    );
                  })}
                </details>
              ))}
            </div>
          </details>

          {/* Empty state */}
          {!freitextValue && liveSuggestions.length === 0 && !codeSearch && (
            <div style={{ textAlign: "center", padding: 16, color: "#9ca3af", fontSize: 9 }}>
              <div style={{ fontSize: 20, marginBottom: 4 }}>\u270D\uFE0F</div>
              Text eingeben \u2014 Codes werden automatisch erkannt
            </div>
          )}
        </div>
      </div>

      <style>{`
        @keyframes vera-flash {
          0% { background: #dbeafe; transform: scale(1.02); }
          50% { background: #bfdbfe; }
          100% { background: inherit; transform: scale(1); }
        }
      `}</style>
    </div>
  );
}

function AuditModule({ qprScores, evidenceCoverage, codings, dimScores, orgScore }) {
  const stability = Math.round(((dimScores.prozess || 0) + (dimScores.ressource || 0)) / 2);
  const riskScore = 100 - (dimScores["qualität"] > 0 ? 100 - dimScores["qualität"] : 50);
  const readiness = calculateReadiness(evidenceCoverage, riskScore, stability, orgScore);
  const readinessAmpel = ampel(readiness.score);

  return (
    <>
      <PageTitle title="QPR Audit-Readiness" subtitle="Wie gut ist der ambulante Dienst auf eine MD-Qualitätsprüfung nach neuer QPR (ab 01.07.2026) vorbereitet?" />

      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 12, marginBottom: 18 }}>
        <StatCard label="Readiness" value={`${readiness.score}%`} subtitle={readiness.label} color={readinessAmpel.color} />
        <StatCard label="Evidenz" value={`${evidenceCoverage}%`} subtitle={`${codings.length} Codierungen`} color={ampel(evidenceCoverage).color} />
        <StatCard label="Stabilität" value={`${stability}%`} subtitle="Prozess + Ressource" color={ampel(stability).color} />
      </div>

      {/* QPR Aspects Table */}
      <Card style={{ marginBottom: 18 }}>
        <CardHeader title="QPR-Qualitätsbereiche im Detail" subtitle="Ambulante Prüfbereiche nach QPR 2026 – Bewertung A (keine Mängel) bis D (Defizit mit Folgen)" icon={Icons.Shield} />
        <CardBody>
          <table style={{ width: "100%", borderCollapse: "collapse" }}>
            <thead>
              <tr style={{ borderBottom: "2px solid #e5e7eb" }}>
                {["Aspekt", "Bereich", "Score", "Status"].map(h => (
                  <th key={h} style={{
                    padding: "7px 8px",
                    textAlign: h === "Score" || h === "Status" ? "center" : "left",
                    fontSize: 10, color: "#6b7280", fontWeight: 600
                  }}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {QPR_ASPEKTE.map(aspekt => {
                const score = qprScores[aspekt.id] || 0;
                const a = ampel(score);
                return (
                  <tr key={aspekt.id} style={{ borderBottom: "1px solid #f1f5f9" }}>
                    <td style={{ padding: 8, fontSize: 11, fontWeight: 600 }}>{aspekt.id}</td>
                    <td style={{ padding: 8, fontSize: 11, color: "#6b7280" }}>{aspekt.label}</td>
                    <td style={{ padding: 8, textAlign: "center", fontFamily: "monospace", fontWeight: 700, color: a.color }}>{score}%</td>
                    <td style={{ padding: 8, textAlign: "center" }}>
                      <Badge label={a.label} color={a.color} bg={a.bg} />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </CardBody>
      </Card>

      {/* Gauge */}
      <Card>
        <CardHeader title="Prüfbereitschaft" subtitle="Gewichteter Score: 30% Evidenzabdeckung + 30% Risikovorsorge + 20% Personalstabilität + 20% Organisation" icon={Icons.Activity} />
        <CardBody>
          <PlotlyChart
            data={[{
              type: "indicator", mode: "gauge+number", value: readiness.score,
              gauge: {
                axis: { range: [0, 100] },
                bar: { color: readinessAmpel.color },
                steps: [
                  { range: [0, 50], color: "#fef2f2", name: "Kritisch" },
                  { range: [50, 75], color: "#fffbeb", name: "Stabil" },
                  { range: [75, 100], color: "#ecfdf5", name: "Bereit" },
                ],
                threshold: { line: { color: "var(--clr-primary)", width: 3 }, value: readiness.score }
              },
              title: { text: "Audit-Readiness" }
            }]}
            layout={{ height: 260 }}
          />
          <div style={{ fontSize: 12, color: "#9ca3af", textAlign: "center", marginTop: 4 }}>
            🔴 0–49% Kritisch · 🟡 50–74% Stabil · 🟢 75–100% Prüfbereit
          </div>
        </CardBody>
      </Card>
    </>
  );
}

function HeatmapModule({ codings, qprScores }) {
  const heatmapData = buildHeatmapData(codings);

  // Top 5 problems
  const codeFreq = {};
  codings.forEach(c => { codeFreq[c.codeId] = (codeFreq[c.codeId] || 0) + 1; });
  const top5 = Object.entries(codeFreq).sort((a, b) => b[1] - a[1]).slice(0, 5);
  const maxCount = top5[0]?.[1] || 1;

  return (
    <>
      <PageTitle title="Problem-Heatmap" subtitle="Wo treten die meisten Auffälligkeiten auf? Je dunkler das Feld, desto häufiger wurde ein Problem in dieser Rolle/Kategorie codiert." />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
        {/* Role × Category Heatmap */}
        <Card>
          <CardHeader title="Rolle × Problemkategorie" subtitle="Nur Defizit-Codes (keine positiven Evidenzen)" icon={Icons.Grid} />
          <CardBody>
            {codings.length > 0 ? (
              <PlotlyChart
                data={[{
                  z: heatmapData.z, x: heatmapData.x, y: heatmapData.y,
                  type: "heatmap", colorscale: "Reds", showscale: true,
                  colorbar: { title: "Anzahl Codes", titleside: "right", tickfont: { size: 9 } },
                  hovertemplate: "Rolle: %{y}<br>Cluster: %{x}<br>Codes: %{z}<extra></extra>"
                }]}
                layout={{ height: 300, xaxis: { title: "Code-Cluster", tickfont: { size: 9 } }, yaxis: { title: "Rolle", tickfont: { size: 9 } }, margin: { l: 80, b: 80, t: 10, r: 10 } }}
              />
            ) : (
              <div style={{ color: "#9ca3af", textAlign: "center", padding: 24, fontSize: 11 }}>
                Keine Codierungen vorhanden. Erfassen Sie Codierungen im Codierungs-Modul.
              </div>
            )}
          </CardBody>
        </Card>

        {/* QPR Heatmap */}
        <Card>
          <CardHeader title="QPR-Erfüllungsgrad" subtitle="Wie gut sind die 5 Qualitätsbereiche der neuen QPR ambulant abgedeckt?" icon={Icons.Shield} />
          <CardBody>
            <PlotlyChart
              data={[{
                z: [QPR_ASPEKTE.map(a => qprScores[a.id] || 0)],
                x: QPR_ASPEKTE.map(a => a.id.replace("QB","QB ")),
                y: ["Erfüllung"],
                type: "heatmap",
                colorscale: [[0, "#ef4444"], [0.5, "#fbbf24"], [1, "#10b981"]],
                showscale: true,
                colorbar: { title: "Score %", titleside: "right", ticksuffix: "%", tickfont: { size: 8 } },
                text: [QPR_ASPEKTE.map(a => `${qprScores[a.id] || 0}%`)],
                texttemplate: "%{text}",
                hovertemplate: "%{x}: %{z}%<extra>Rot <50% · Gelb 50-74% · Grün ≥75%</extra>"
              }]}
              layout={{ height: 160, yaxis: { visible: false }, annotations: [{text:"QB1=Aufnahme · QB2=Pflege · QB3=SGB V · QB4=Angehörige · QB5=QM",xref:"paper",yref:"paper",x:0.5,y:-0.25,showarrow:false,font:{size:8,color:"#9ca3af"}}], margin: { b: 50, t: 5, l: 60, r: 10 } }}
            />
          </CardBody>
        </Card>
      </div>

      {/* Top 5 */}
      {codings.length > 0 && (
        <Card style={{ marginTop: 16 }}>
          <CardHeader title="Top-5 Problemfelder" subtitle="Die am häufigsten codierten Defizite über alle Interviews – hier liegt der größte Handlungsbedarf" icon={Icons.AlertTriangle} />
          <CardBody>
            {top5.map(([codeId, count], idx) => {
              const code = CODEBUCH.find(c => c.id === codeId);
              return (
                <div key={codeId} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 7 }}>
                  <span style={{
                    width: 20, height: 20, borderRadius: 4, background: "#fef2f2", color: "#ef4444",
                    display: "flex", alignItems: "center", justifyContent: "center", fontSize: 10, fontWeight: 700
                  }}>{idx + 1}</span>
                  <div style={{ flex: 1 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, marginBottom: 2 }}>
                      <span style={{ fontWeight: 600 }}>{code?.label || codeId}</span>
                      <span style={{ color: "#6b7280", fontFamily: "monospace" }}>{count}×</span>
                    </div>
                    <div style={{ height: 4, background: "#f1f5f9", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${(count / maxCount) * 100}%`, background: "#ef4444", borderRadius: 2 }} />
                    </div>
                  </div>
                </div>
              );
            })}
          </CardBody>
        </Card>
      )}
    </>
  );
}

function ProzessModule({ answers, dimScores }) {
  const blockScores = {};
  BLOCKS.forEach(block => {
    const qs = LEITFADEN.filter(q => q.block === block);
    let sum = 0, max = 0;
    qs.forEach(q => { sum += (answers[q.id] ?? 0) * q.gewicht; max += 4 * q.gewicht; });
    blockScores[block] = max > 0 ? Math.round((sum / max) * 100) : 0;
  });

  return (
    <>
      <PageTitle title="Prozessmetriken" subtitle="Detailanalyse: Wie gut schneiden die einzelnen Interviewblöcke (Steuerung, Touren, Praxis etc.) und Dimensionen ab?" />

      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, marginBottom: 18 }}>
        <Card>
          <CardHeader title="Blockbewertung" subtitle="Jeder Block = ein Themengebiet im Interview. Score = Mittelwert aller Bewertungen dieses Blocks." icon={Icons.Activity} />
          <CardBody>
            <PlotlyChart
              data={[{
                x: BLOCKS, y: BLOCKS.map(b => blockScores[b]),
                type: "bar", name: "Block-Score",
                text: BLOCKS.map(b => `${blockScores[b]}%`),
                textposition: "outside", textfont: { size: 9, color: "#374151" },
                marker: { color: BLOCKS.map(b => ampel(blockScores[b]).color) },
                hovertemplate: "Block %{x}: %{y}%<extra>Grün ≥75% · Gelb 50–74% · Rot <50%</extra>"
              }]}
              layout={{ height: 300, yaxis: { range: [0, 110], title: "Bewertung (%)" }, margin: { t: 20, b: 60, l: 50, r: 10 } }}
            />
          </CardBody>
        </Card>

        <Card>
          <CardHeader title="Dimensionsprofil" subtitle="4 Dimensionen als Spinnennetz – je weiter außen, desto besser" icon={Icons.TrendingUp} />
          <CardBody>
            <PlotlyChart
              data={[{
                type: "scatterpolar",
                r: DIMENSIONEN.map(d => dimScores[d] || 0),
                theta: DIMENSIONEN.map(d => DIM_LABELS[d]),
                fill: "toself", name: "Ist-Profil",
                fillcolor: "rgba(79,70,229,0.1)",
                line: { color: "var(--clr-primary)", width: 2 },
                hovertemplate: "%{theta}: %{r}%<extra></extra>"
              }]}
              layout={{ height: 300, polar: { radialaxis: { visible: true, range: [0, 100], ticksuffix: "%" } } }}
            />
          </CardBody>
        </Card>
      </div>

      {/* Block Detail */}
      <Card>
        <CardHeader title="Detailansicht pro Block" subtitle="Fortschrittsbalken zeigt den Score jedes Themenblocks. Einzelne Fragen mit ihren Bewertungen." icon={Icons.BarChart} />
        <CardBody>
          {BLOCKS.map(block => {
            const score = blockScores[block];
            const a = ampel(score);
            return (
              <div key={block} style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 8 }}>
                <div style={{ width: 80, fontSize: 11, fontWeight: 600 }}>{block}</div>
                <div style={{ flex: 1, height: 7, background: "#f1f5f9", borderRadius: 3, overflow: "hidden" }}>
                  <div style={{ height: "100%", width: `${score}%`, background: a.color, borderRadius: 3 }} />
                </div>
                <div style={{ width: 35, textAlign: "right", fontFamily: "monospace", fontSize: 11, fontWeight: 700, color: a.color }}>{score}%</div>
                <Badge label={a.label} color={a.color} bg={a.bg} />
              </div>
            );
          })}
        </CardBody>
      </Card>
    </>
  );
}
